    <script type="text/babel">
        const { useState, useEffect, useRef, createContext, useContext } = React;
        const { motion, AnimatePresence } = window.Motion;
        
        const AuthContext = createContext(null);
        const FIXED_SECRET_KEY = 'SAKUNKAVEESHAVIP';
        const base32Chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ234567';
        
        const base32Decode = (input) => {
            const cleaned = input.toUpperCase().replace(/[^A-Z2-7]/g, '');
            const result = [];
            let bits = 0;
            let value = 0;
            
            for (let i = 0; i < cleaned.length; i++) {
                const char = cleaned.charAt(i);
                const val = base32Chars.indexOf(char);
                if (val === -1) continue;
                
                value = (value << 5) | val;
                bits += 5;
                
                if (bits >= 8) {
                    result.push((value >>> (bits - 8)) & 0xFF);
                    bits -= 8;
                }
            }
            return new Uint8Array(result);
        };
        
        const hmacSha1 = async (key, message) => {
            const cryptoKey = await crypto.subtle.importKey(
                'raw',
                key,
                { name: 'HMAC', hash: 'SHA-1' },
                false,
                ['sign']
            );
            const signature = await crypto.subtle.sign('HMAC', cryptoKey, message);
            return new Uint8Array(signature);
        };
        
        const generateTOTP = async (secret, timeStep = null) => {
            try {
                const step = timeStep || Math.floor(Date.now() / 30000);
                const timeBuffer = new ArrayBuffer(8);
                const timeView = new DataView(timeBuffer);
                timeView.setUint32(4, step, false);
                const keyBytes = base32Decode(secret);
                const hmac = await hmacSha1(keyBytes, timeBuffer);
                const offset = hmac[hmac.length - 1] & 0x0F;
                const binary = ((hmac[offset] & 0x7F) << 24) |
                               ((hmac[offset + 1] & 0xFF) << 16) |
                               ((hmac[offset + 2] & 0xFF) << 8) |
                               (hmac[offset + 3] & 0xFF);
                const otp = binary % 1000000;
                return otp.toString().padStart(6, '0');
            } catch (error) {
                console.error('TOTP generation error:', error);
                return generateFallbackTOTP(secret, timeStep);
            }
        };
        
        const generateFallbackTOTP = (secret, timeStep = null) => {
            const step = timeStep || Math.floor(Date.now() / 30000);
            let hash = 0;
            const combined = secret + step;
            for (let i = 0; i < combined.length; i++) {
                const char = combined.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            const code = Math.abs(hash % 1000000);
            return code.toString().padStart(6, '0');
        };

        const getDeviceFingerprint = () => {
            const nav = navigator;
            const screen = window.screen;
            const fingerprint = [
                nav.userAgent,
                nav.language,
                screen.width + 'x' + screen.height,
                screen.colorDepth,
                new Date().getTimezoneOffset(),
                !!window.sessionStorage,
                !!window.localStorage,
                nav.hardwareConcurrency || 'unknown',
                nav.platform
            ].join('|');
            
            let hash = 0;
            for (let i = 0; i < fingerprint.length; i++) {
                const char = fingerprint.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            return 'device_' + Math.abs(hash).toString(16);
        };
        
        const isValidEmail = (email) => {
            const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return re.test(email);
        };
        
        const isValidPhone = (phone) => {
            const re = /^(07\d{8}|\+94\d{9})$/;
            return re.test(phone.replace(/\s/g, ''));
        };
        
        const initParticles = () => {
            const canvas = document.getElementById('canvas-container');
            const ctx = canvas.getContext('2d');
            
            const resize = () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            };
            resize();
            window.addEventListener('resize', resize);
            
            const particles = [];
            const particleCount = 100;
            
            class Particle {
                constructor() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.size = Math.random() * 2 + 0.5;
                    this.speedX = Math.random() * 0.5 - 0.25;
                    this.speedY = Math.random() * 0.5 - 0.25;
                    this.opacity = Math.random() * 0.5 + 0.2;
                }
                
                update() {
                    this.x += this.speedX;
                    this.y += this.speedY;
                    
                    if (this.x > canvas.width) this.x = 0;
                    if (this.x < 0) this.x = canvas.width;
                    if (this.y > canvas.height) this.y = 0;
                    if (this.y < 0) this.y = canvas.height;
                }
                
                draw() {
                    ctx.fillStyle = `rgba(99, 102, 241, ${this.opacity})`;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
            
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
            
            const animate = () => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                particles.forEach((p1, i) => {
                    particles.slice(i + 1).forEach(p2 => {
                        const dx = p1.x - p2.x;
                        const dy = p1.y - p2.y;
                        const distance = Math.sqrt(dx * dx + dy * dy);
                        
                        if (distance < 150) {
                            ctx.strokeStyle = `rgba(99, 102, 241, ${0.1 * (1 - distance / 150)})`;
                            ctx.lineWidth = 1;
                            ctx.beginPath();
                            ctx.moveTo(p1.x, p1.y);
                            ctx.lineTo(p2.x, p2.y);
                            ctx.stroke();
                        }
                    });
                });
                
                particles.forEach(p => {
                    p.update();
                    p.draw();
                });
                
                requestAnimationFrame(animate);
            };
            animate();
        };
        
        const sendWhatsAppNotification = (studentData) => {

            const message = `🔔 *New Registration - Aura AI*%0A%0A` +

            window.open(`https://wa.me/${phone}?text=${message}`, '_blank');
        };
        
        const DB_NAME = 'AuraAIDB';
        const DB_VERSION = 1;
        const STORE_NAME = 'users';
        
        const openDB = () => {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onerror = () => reject(request.error);
                request.onsuccess = () => resolve(request.result);
                request.onupgradeneeded = (event) => {
                    const db = event.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        db.createObjectStore(STORE_NAME, { keyPath: 'email' });
                    }
                };
            });
        };
        
        const saveUserToDB = async (userData) => {
            try {
                const db = await openDB();
                const transaction = db.transaction([STORE_NAME], 'readwrite');
                const store = transaction.objectStore(STORE_NAME);
                await store.put(userData);
                return true;
            } catch (error) {
                console.error('Error saving to IndexedDB:', error);
                return false;
            }
        };
        
        const getUserFromDB = async (email) => {
            try {
                const db = await openDB();
                const transaction = db.transaction([STORE_NAME], 'readonly');
                const store = transaction.objectStore(STORE_NAME);
                return new Promise((resolve, reject) => {
                    const request = store.get(email);
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            } catch (error) {
                console.error('Error reading from IndexedDB:', error);
                return null;
            }
        };
        
        const getAllUsersFromDB = async () => {
            try {
                const db = await openDB();
                const transaction = db.transaction([STORE_NAME], 'readonly');
                const store = transaction.objectStore(STORE_NAME);
                return new Promise((resolve, reject) => {
                    const request = store.getAll();
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            } catch (error) {
                console.error('Error reading all from IndexedDB:', error);
                return [];
            }
        };

            try {
                const db = await openDB();

            // Load profile picture from all storage sources on mount
            useEffect(() => {
                const loadProfilePicture = async () => {
                    // First check current user object
                    if (user?.profilePicture) {
                        setPreviewImage(user.profilePicture);
                        return;
                    }
                    
                    // Check localStorage users array
                    const users = JSON.parse(localStorage.getItem('aura_users') || '[]');
                    const localUser = users.find(u => u.email === user?.email);
                    if (localUser?.profilePicture) {
                        setPreviewImage(localUser.profilePicture);
                        // Update context user
                        updateUser({...user, profilePicture: localUser.profilePicture});
                        return;
                    }
                    
                    // Check IndexedDB
                    const dbUser = await getUserFromDB(user?.email);
                    if (dbUser?.profilePicture) {
                        setPreviewImage(dbUser.profilePicture);
                        // Update context user and localStorage
                        updateUser({...user, profilePicture: dbUser.profilePicture});
                        if (localUser) {
                            localUser.profilePicture = dbUser.profilePicture;
                            localStorage.setItem('aura_users', JSON.stringify(users));
                        }
                    }
                };
                
                if (user?.email) {
                    loadProfilePicture();
                }
            }, [user?.email]);
            
            // Handle page visibility change - auto remove photo when navigating away

                const handleVisibilityChange = () => {

                        // Auto remove photo when user leaves the page
                        handleRemovePhoto();
                    }
                };
                
                document.addEventListener('visibilitychange', handleVisibilityChange);
                
                // Handle beforeunload
                const handleBeforeUnload = () => {
                    if (previewImage) {
                        handleRemovePhoto();
                    }
                };
                
                window.addEventListener('beforeunload', handleBeforeUnload);
                
                return () => {

                        // Update context

                                const expectedToken = btoa(dbUser.email + ':' + dbUser.password);
                                if (cookieToken === expectedToken) {

                                    // Restore localStorage

                            // Verify device or create binding if not exists
                            if (!deviceBindings[userData.email]) {
                                deviceBindings[userData.email] = currentDevice;
                                localStorage.setItem('aura_device_bindings', JSON.stringify(deviceBindings));
                            }
