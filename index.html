<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura AI Creations - AI Video Course Platform</title>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Noto+Sans+Sinhala:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'Noto Sans Sinhala', 'sans-serif'],
                    },
                    colors: {
                        aura: {
                            primary: '#6366f1',
                            secondary: '#8b5cf6',
                            accent: '#ec4899',
                            dark: '#0f172a',
                            darker: '#020617',
                        }
                    },
                    animation: {
                        'gradient': 'gradient 8s linear infinite',
                        'float': 'float 6s ease-in-out infinite',
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'shake': 'shake 0.5s cubic-bezier(.36,.07,.19,.97) both',
                        'glow': 'glow 2s ease-in-out infinite alternate',
                    },
                    keyframes: {
                        gradient: {
                            '0%, 100%': { backgroundPosition: '0% 50%' },
                            '50%': { backgroundPosition: '100% 50%' },
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-20px)' },
                        },
                        shake: {
                            '10%, 90%': { transform: 'translate3d(-1px, 0, 0)' },
                            '20%, 80%': { transform: 'translate3d(2px, 0, 0)' },
                            '30%, 50%, 70%': { transform: 'translate3d(-4px, 0, 0)' },
                            '40%, 60%': { transform: 'translate3d(4px, 0, 0)' }
                        },
                        glow: {
                            '0%': { boxShadow: '0 0 5px #6366f1, 0 0 10px #6366f1' },
                            '100%': { boxShadow: '0 0 20px #6366f1, 0 0 30px #8b5cf6' }
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        body { background: #020617; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .glass-strong { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(99, 102, 241, 0.2); }
        .gradient-text { background: linear-gradient(135deg, #6366f1 0%, #ec4899 50%, #8b5cf6 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        #canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
        .video-progress { background: linear-gradient(90deg, #6366f1 0%, #ec4899 100%); }
        .video-thumbnail { width: 100%; height: 100%; object-fit: cover; border-radius: 1rem; }
    </style>
</head>
<body>
    <div id="root"></div>
    <canvas id="canvas-container"></canvas>

    <script type="text/babel">
        const { useState, useEffect, useRef, createContext, useContext } = React;
        const { motion, AnimatePresence } = window.Motion;
        
        const AuthContext = createContext(null);
        const FIXED_SECRET_KEY = 'AURAAICREION4VIP';
        
        // TOTP Implementation remains same...
        const base32Decode = (input) => {
            const cleaned = input.toUpperCase().replace(/[^A-Z2-7]/g, '');
            const result = []; let bits = 0; let value = 0;
            for (let i = 0; i < cleaned.length; i++) {
                const val = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ234567'.indexOf(cleaned.charAt(i));
                if (val === -1) continue;
                value = (value << 5) | val; bits += 5;
                if (bits >= 8) { result.push((value >>> (bits - 8)) & 0xFF); bits -= 8; }
            }
            return new Uint8Array(result);
        };

        const hmacSha1 = async (key, message) => {
            const cryptoKey = await crypto.subtle.importKey('raw', key, { name: 'HMAC', hash: 'SHA-1' }, false, ['sign']);
            const signature = await crypto.subtle.sign('HMAC', cryptoKey, message);
            return new Uint8Array(signature);
        };

        const generateTOTP = async (secret) => {
            const step = Math.floor(Date.now() / 30000);
            const timeBuffer = new ArrayBuffer(8);
            new DataView(timeBuffer).setUint32(4, step, false);
            const hmac = await hmacSha1(base32Decode(secret), timeBuffer);
            const offset = hmac[hmac.length - 1] & 0x0F;
            const binary = ((hmac[offset] & 0x7F) << 24) | ((hmac[offset + 1] & 0xFF) << 16) | ((hmac[offset + 2] & 0xFF) << 8) | (hmac[offset + 3] & 0xFF);
            return (binary % 1000000).toString().padStart(6, '0');
        };

        // Particle Background init
        const initParticles = () => {
            const canvas = document.getElementById('canvas-container');
            const ctx = canvas.getContext('2d');
            const resize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
            resize(); window.addEventListener('resize', resize);
            const particles = Array.from({ length: 100 }, () => ({
                x: Math.random() * canvas.width, y: Math.random() * canvas.height,
                size: Math.random() * 2 + 0.5, speedX: Math.random() * 0.5 - 0.25,
                speedY: Math.random() * 0.5 - 0.25, opacity: Math.random() * 0.5 + 0.2
            }));
            const animate = () => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(p => {
                    p.x += p.speedX; p.y += p.speedY;
                    if (p.x > canvas.width) p.x = 0; if (p.x < 0) p.x = canvas.width;
                    if (p.y > canvas.height) p.y = 0; if (p.y < 0) p.y = canvas.height;
                    ctx.fillStyle = `rgba(99, 102, 241, ${p.opacity})`;
                    ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
                });
                requestAnimationFrame(animate);
            };
            animate();
        };

        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} width={size} height={size} className={className} style={{display: 'inline-block'}}></i>;
        };

        const Navigation = () => {
            const { user, isLoggedIn } = useContext(AuthContext);
            const [scrolled, setScrolled] = useState(false);
            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);
            const handleNav = (id) => window.dispatchEvent(new CustomEvent('navigate', { detail: id }));
            return (
                <motion.nav className={`fixed top-0 left-0 right-0 z-50 transition-all ${scrolled ? 'glass-strong py-3' : 'py-6 bg-transparent'}`}>
                    <div className="max-w-7xl mx-auto px-6 flex items-center justify-between">
                        <div className="flex items-center gap-3 cursor-pointer" onClick={() => handleNav('home')}>
                            <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-indigo-500 to-pink-500 flex items-center justify-center overflow-hidden"><img src="https://files.aura-ai.top/logo.png" alt="Logo" className="w-full h-full object-cover" /></div>
                            <span className="text-xl font-bold text-white">Aura <span className="gradient-text">AI</span></span>
                        </div>
                        <div className="flex items-center gap-4">
                            {isLoggedIn ? (
                                <div className="flex items-center gap-3 glass px-4 py-2 rounded-full cursor-pointer" onClick={() => handleNav('profile')}>
                                    <div className="w-8 h-8 rounded-full bg-indigo-500 flex items-center justify-center overflow-hidden">{user?.profilePicture ? <img src={user.profilePicture} className="w-full h-full object-cover" /> : <span className="text-white text-xs">{user?.name?.[0]}</span>}</div>
                                    <span className="text-white text-sm hidden sm:block">{user?.name}</span>
                                </div>
                            ) : <button onClick={() => handleNav('auth')} className="px-6 py-2 bg-indigo-600 text-white rounded-full text-sm">Login</button>}
                        </div>
                    </div>
                </motion.nav>
            );
        };

        const Hero = () => (
            <section className="min-h-screen flex items-center justify-center pt-20">
                <div className="text-center px-6">
                    <h1 className="text-5xl lg:text-7xl font-bold text-white mb-6 leading-tight">Master AI with <br/><span className="gradient-text">Aura Creations</span></h1>
                    <p className="text-gray-400 text-lg mb-8 max-w-2xl mx-auto">භාෂාමය බාධාවකින් තොරව සිංහලෙන්ම AI ඉගෙන ගන්න. අදම ඔබේ අනාගතය වෙනස් කරගන්න.</p>
                    <button onClick={() => window.dispatchEvent(new CustomEvent('navigate', { detail: 'auth' }))} className="px-8 py-4 bg-indigo-600 text-white rounded-full font-semibold text-lg hover:shadow-2xl transition-all">Start Learning Now</button>
                </div>
            </section>
        );

        const AuthPage = ({ onLogin }) => {
            const [isLogin, setIsLogin] = useState(true);
            const [formData, setFormData] = useState({ name: '', email: '', phone: '', password: '', otp: '' });
            const [step, setStep] = useState(1);
            const [error, setError] = useState('');

            const handleAuth = async () => {
                if (isLogin) {
                    const users = JSON.parse(localStorage.getItem('aura_users') || '[]');
                    const user = users.find(u => u.email === formData.email && u.password === formData.password);
                    if (user) onLogin(user); else setError('Invalid credentials');
                } else {
                    if (step === 1) {
                        if (!formData.email || !formData.password) return setError('Fill all fields');
                        setStep(2);
                    } else {
                        const correctOtp = await generateTOTP(FIXED_SECRET_KEY);
                        if (formData.otp === correctOtp) {
                            const newUser = { ...formData, registeredAt: new Date().toISOString() };
                            const users = JSON.parse(localStorage.getItem('aura_users') || '[]');
                            users.push(newUser); localStorage.setItem('aura_users', JSON.stringify(users));
                            onLogin(newUser);
                        } else setError('Invalid OTP');
                    }
                }
            };

            return (
                <div className="min-h-screen flex items-center justify-center p-6">
                    <div className="glass-strong p-8 rounded-3xl w-full max-w-md">
                        <h2 className="text-2xl font-bold text-white mb-6 text-center">{isLogin ? 'Login' : 'Register'}</h2>
                        {error && <p className="text-red-400 mb-4 text-sm">{error}</p>}
                        <div className="space-y-4">
                            {!isLogin && step === 1 && <input type="text" placeholder="Full Name" className="w-full p-3 bg-gray-800 rounded-xl text-white outline-none" onChange={e => setFormData({...formData, name: e.target.value})} />}
                            {step === 1 && <input type="email" placeholder="Email" className="w-full p-3 bg-gray-800 rounded-xl text-white outline-none" onChange={e => setFormData({...formData, email: e.target.value})} />}
                            {step === 1 && <input type="password" placeholder="Password" className="w-full p-3 bg-gray-800 rounded-xl text-white outline-none" onChange={e => setFormData({...formData, password: e.target.value})} />}
                            {step === 2 && <input type="text" placeholder="OTP Code" className="w-full p-3 bg-gray-800 rounded-xl text-white text-center text-2xl tracking-widest outline-none" onChange={e => setFormData({...formData, otp: e.target.value})} />}
                            <button onClick={handleAuth} className="w-full py-3 bg-indigo-600 text-white rounded-xl font-bold">{step === 1 ? (isLogin ? 'Login' : 'Next') : 'Verify'}</button>
                            <p className="text-center text-gray-400 text-sm cursor-pointer" onClick={() => {setIsLogin(!isLogin); setStep(1);}}>{isLogin ? "Don't have an account? Register" : "Have an account? Login"}</p>
                        </div>
                    </div>
                </div>
            );
        };

        const Profile = ({ user, onLogout }) => (
            <div className="min-h-screen pt-32 flex justify-center p-6">
                <div className="glass-strong p-8 rounded-3xl w-full max-w-md text-center">
                    <div className="w-24 h-24 bg-indigo-500 rounded-full mx-auto mb-4 flex items-center justify-center text-3xl font-bold text-white">{user?.name[0]}</div>
                    <h2 className="text-2xl font-bold text-white">{user?.name}</h2>
                    <p className="text-gray-400 mb-6">{user?.email}</p>
                    <button onClick={onLogout} className="w-full py-3 border border-red-500/30 text-red-400 rounded-xl">Logout</button>
                </div>
            </div>
        );

        const Dashboard = ({ user, onLogout }) => {
            const [completedLessons, setCompletedLessons] = useState(() => JSON.parse(localStorage.getItem(`completed_${user.email}`) || '[]'));
            const [activeLesson, setActiveLesson] = useState(null);
            const [activeModuleIdx, setActiveModuleIdx] = useState(0);
            const [watching, setWatching] = useState(false);

            useEffect(() => {
                localStorage.setItem(`completed_${user.email}`, JSON.stringify(completedLessons));
            }, [completedLessons]);

            const modules = [
                { 
                    title: 'AI Foundations - Basic Lessons', 
                    lessons: [
                        { id: 1, title: 'AI හැදින්විම (Intro)', duration: '15:00', videoUrl: 'https://drive.google.com/file/d/1GZ-h7SIAG5bOIavwLng1Sh1N2BdUmIW6/preview', thumbnail: 'https://drive.google.com/thumbnail?id=1GZ-h7SIAG5bOIavwLng1Sh1N2BdUmIW6&sz=w1000' },
                        { id: 2, title: 'Lesson 1 - AI Basics', duration: '12:30', videoUrl: 'https://drive.google.com/file/d/10-4GWQ_FAcUNrdnC3zqtOnGXSmsX2Y2R/preview', thumbnail: 'https://drive.google.com/thumbnail?id=10-4GWQ_FAcUNrdnC3zqtOnGXSmsX2Y2R&sz=w1000' },
                        { id: 3, title: 'Lesson 2 - Getting Started', duration: '18:45', videoUrl: 'https://drive.google.com/file/d/1uHMAdhZJSqwYar8XYV_NrUQcbA0i6g6-/preview', thumbnail: 'https://drive.google.com/thumbnail?id=1uHMAdhZJSqwYar8XYV_NrUQcbA0i6g6-&sz=w1000' },
                        { id: 4, title: 'Lesson 3 - Core Concepts', duration: '20:00', videoUrl: 'https://drive.google.com/file/d/1nQdUC8NrFpd-GiTgvSmYpsdVDK6r3lJy/preview', thumbnail: 'https://drive.google.com/thumbnail?id=1nQdUC8NrFpd-GiTgvSmYpsdVDK6r3lJy&sz=w1000' },
                        { id: 5, title: 'Lesson 4 - Applications', duration: '22:15', videoUrl: 'https://drive.google.com/file/d/10hgirQhLVu5IoalRBLnIW7CMyl9vQiy_/preview', thumbnail: 'https://drive.google.com/thumbnail?id=10hgirQhLVu5IoalRBLnIW7CMyl9vQiy_&sz=w1000' },
                        { id: 6, title: 'Lesson 5 - Advanced', duration: '25:00', videoUrl: 'https://drive.google.com/file/d/1HXyLn9wDiGiLCelEXr0jipPIcQ5EjfMC/preview', thumbnail: 'https://drive.google.com/thumbnail?id=1HXyLn9wDiGiLCelEXr0jipPIcQ5EjfMC&sz=w1000' },
                        { id: 7, title: 'Lesson 6 - Final Intro', duration: '16:30', videoUrl: 'https://drive.google.com/file/d/1kswDC7oT5YV9SfqdBlmARDJj6_eiyJzD/preview', thumbnail: 'https://drive.google.com/thumbnail?id=1kswDC7oT5YV9SfqdBlmARDJj6_eiyJzD&sz=w1000' }
                    ]
                },
                {
                    title: 'Founder Mastery Course',
                    isLocked: modules => !modules[0].lessons.every(l => completedLessons.includes(l.id)),
                    lessons: [
                        { id: 8, title: 'Founder mastery Lesson 1', duration: '20:00', videoUrl: 'https://drive.google.com/file/d/1LmDbGoHxZOlRLnShNKXxyjy0aI0g4UA8/preview', thumbnail: 'https://drive.google.com/thumbnail?id=1LmDbGoHxZOlRLnShNKXxyjy0aI0g4UA8&sz=w1000' },
                        { id: 9, title: 'Founder mastery Lesson 2', duration: '20:00', videoUrl: 'https://drive.google.com/file/d/1SBag6taDaltJOhJXfTrAAuqsk5Dq60zu/preview', thumbnail: 'https://drive.google.com/thumbnail?id=1SBag6taDaltJOhJXfTrAAuqsk5Dq60zu&sz=w1000' },
                        { id: 10, title: 'Founder mastery Lesson 3', duration: '20:00', videoUrl: 'https://drive.google.com/file/d/1scvSqL8t2OjPLXTBWJPSEyxPjKjvwQ65/preview', thumbnail: 'https://drive.google.com/thumbnail?id=1scvSqL8t2OjPLXTBWJPSEyxPjKjvwQ65&sz=w1000' },
                        { id: 11, title: 'Founder mastery Lesson 4', duration: '20:00', videoUrl: 'https://drive.google.com/file/d/1ErUKP4NjFbUk2q2NyTCHJsf8whOm2YEt/preview', thumbnail: 'https://drive.google.com/thumbnail?id=1ErUKP4NjFbUk2q2NyTCHJsf8whOm2YEt&sz=w1000' },
                        { id: 12, title: 'Founder mastery Lesson 5', duration: '20:00', videoUrl: 'https://drive.google.com/file/d/15qs0O0vPuCiLbaNU0gTIfyNHaqce8D7q/preview', thumbnail: 'https://drive.google.com/thumbnail?id=15qs0O0vPuCiLbaNU0gTIfyNHaqce8D7q&sz=w1000' },
                        { id: 13, title: 'Founder mastery Lesson 6', duration: '20:00', videoUrl: 'https://drive.google.com/file/d/18mSOecPmCVjpXaxHtQyPC24nwR57prmX/preview', thumbnail: 'https://drive.google.com/thumbnail?id=18mSOecPmCVjpXaxHtQyPC24nwR57prmX&sz=w1000' }
                    ]
                }
            ];

            const totalCount = modules.reduce((a, b) => a + b.lessons.length, 0);
            const progressPercent = Math.round((completedLessons.length / totalCount) * 100);

            const handleLessonClick = (lesson, mIdx, lIdx) => {
                const isModuleLocked = modules[mIdx].isLocked && modules[mIdx].isLocked(modules);
                if (isModuleLocked) return alert("AI Foundations - Basic Lessons සියල්ල සම්පූර්ණ කරන්න!");

                // Sequence check within module
                if (lIdx > 0 && !completedLessons.includes(modules[mIdx].lessons[lIdx-1].id)) {
                    return alert("කරුණාකර පෙර පාඩම නරඹා අවසන් කරන්න!");
                }
                
                setActiveLesson(lesson);
                setWatching(false);
            };

            return (
                <div className="min-h-screen pt-32 pb-20 px-6">
                    <div className="max-w-7xl mx-auto grid lg:grid-cols-3 gap-8">
                        {/* Sidebar */}
                        <div className="space-y-6">
                            <div className="glass-strong p-6 rounded-3xl">
                                <h3 className="text-white font-bold mb-4">Course Progress</h3>
                                <div className="h-3 bg-gray-800 rounded-full mb-2 overflow-hidden">
                                    <div className="h-full video-progress transition-all duration-500" style={{width: `${progressPercent}%`}}></div>
                                </div>
                                <div className="flex justify-between text-xs text-gray-400">
                                    <span>{progressPercent}% Completed</span>
                                    <span>{completedLessons.length}/{totalCount} Lessons</span>
                                </div>
                            </div>
                            
                            <div className="glass p-4 rounded-3xl space-y-4 max-h-[60vh] overflow-y-auto">
                                {modules.map((m, mIdx) => {
                                    const isLocked = m.isLocked && m.isLocked(modules);
                                    return (
                                        <div key={mIdx}>
                                            <div className={`p-3 rounded-xl mb-2 flex items-center justify-between ${activeModuleIdx === mIdx ? 'bg-indigo-600/20 text-indigo-400' : 'text-gray-400'}`}>
                                                <span className="text-sm font-bold">{m.title}</span>
                                                {isLocked && <Icon name="lock" size={14} />}
                                            </div>
                                            <div className="ml-2 space-y-1">
                                                {m.lessons.map((l, lIdx) => {
                                                    const isDone = completedLessons.includes(l.id);
                                                    return (
                                                        <button key={l.id} disabled={isLocked} onClick={() => handleLessonClick(l, mIdx, lIdx)}
                                                            className={`w-full text-left p-2 rounded-lg text-xs flex items-center gap-2 ${activeLesson?.id === l.id ? 'bg-white/10 text-white' : isLocked ? 'opacity-30 cursor-not-allowed' : 'text-gray-500 hover:bg-white/5'}`}>
                                                            {isDone ? <Icon name="check-circle" size={14} className="text-green-500"/> : <Icon name="play-circle" size={14}/>}
                                                            <span className="truncate">{l.title}</span>
                                                        </button>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>

                        {/* Video Area */}
                        <div className="lg:col-span-2 space-y-6">
                            <div className="glass-strong rounded-3xl overflow-hidden aspect-video relative bg-black flex items-center justify-center">
                                {activeLesson ? (
                                    watching ? (
                                        <iframe src={activeLesson.videoUrl} className="w-full h-full border-0" allow="autoplay"></iframe>
                                    ) : (
                                        <div className="relative w-full h-full cursor-pointer" onClick={() => setWatching(true)}>
                                            <img src={activeLesson.thumbnail} className="w-full h-full object-cover opacity-60" />
                                            <div className="absolute inset-0 flex items-center justify-center">
                                                <div className="w-20 h-20 bg-indigo-600 rounded-full flex items-center justify-center"><Icon name="play" size={40} className="text-white ml-1"/></div>
                                            </div>
                                        </div>
                                    )
                                ) : (
                                    <div className="text-center p-8">
                                        <Icon name="youtube" size={48} className="text-indigo-500 mx-auto mb-4" />
                                        <h3 className="text-white font-bold">පාඩමක් තෝරා ගන්න</h3>
                                        <p className="text-gray-500 text-sm">ඉගෙන ගැනීම ආරම්භ කිරීමට වම්පසින් ඇති පාඩමක් මත ක්ලික් කරන්න.</p>
                                    </div>
                                )}
                            </div>

                            {activeLesson && (
                                <div className="glass-strong p-8 rounded-3xl">
                                    <div className="flex justify-between items-start mb-6">
                                        <div>
                                            <h2 className="text-2xl font-bold text-white mb-2">{activeLesson.title}</h2>
                                            <p className="text-gray-400">Duration: {activeLesson.duration}</p>
                                        </div>
                                        {!completedLessons.includes(activeLesson.id) ? (
                                            <button onClick={() => setCompletedLessons([...completedLessons, activeLesson.id])} 
                                                className="px-6 py-3 bg-green-600 text-white rounded-xl font-bold flex items-center gap-2">
                                                <Icon name="check" size={18}/> Mark as Done
                                            </button>
                                        ) : (
                                            <div className="px-6 py-3 bg-green-600/20 text-green-500 rounded-xl font-bold flex items-center gap-2">
                                                <Icon name="check-circle" size={18}/> Completed
                                            </div>
                                        )}
                                    </div>
                                    <div className="p-4 bg-white/5 rounded-2xl border border-white/10 text-gray-400 text-sm">
                                        <p>💡 මෙම පාඩම නැරඹූ පසු "Mark as Done" බොත්තම ඔබන්න. එවිට ඔබට මීළඟ පාඩම නැරඹීමට අවස්ථාව ලැබෙනු ඇත.</p>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [page, setPage] = useState('home');
            const [user, setUser] = useState(() => JSON.parse(localStorage.getItem('aura_current_user')));
            const isLoggedIn = !!user;

            useEffect(() => {
                initParticles();
                const handleNav = (e) => setPage(e.detail);
                window.addEventListener('navigate', handleNav);
                return () => window.removeEventListener('navigate', handleNav);
            }, []);

            const login = (u) => {
                setUser(u); localStorage.setItem('aura_current_user', JSON.stringify(u));
                setPage('dashboard');
            };

            const logout = () => {
                setUser(null); localStorage.removeItem('aura_current_user');
                setPage('home');
            };

            return (
                <AuthContext.Provider value={{ user, isLoggedIn, logout }}>
                    <Navigation />
                    <AnimatePresence mode="wait">
                        <motion.main key={page} initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }}>
                            {page === 'home' && <Hero />}
                            {page === 'auth' && <AuthPage onLogin={login} />}
                            {page === 'profile' && (isLoggedIn ? <Profile user={user} onLogout={logout} /> : <AuthPage onLogin={login} />)}
                            {page === 'dashboard' && (isLoggedIn ? <Dashboard user={user} onLogout={logout} /> : <AuthPage onLogin={login} />)}
                        </motion.main>
                    </AnimatePresence>
                </AuthContext.Provider>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
