<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura AI Creations - AI Video Course Platform</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Framer Motion -->
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- QRCode.js for Authenticator QR -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Noto+Sans+Sinhala:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'Noto Sans Sinhala', 'sans-serif'],
                    },
                    colors: {
                        aura: {
                            primary: '#6366f1',
                            secondary: '#8b5cf6',
                            accent: '#ec4899',
                            dark: '#0f172a',
                            darker: '#020617',
                        }
                    },
                    animation: {
                        'gradient': 'gradient 8s linear infinite',
                        'float': 'float 6s ease-in-out infinite',
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'shake': 'shake 0.5s cubic-bezier(.36,.07,.19,.97) both',
                    },
                    keyframes: {
                        gradient: {
                            '0%, 100%': { backgroundPosition: '0% 50%' },
                            '50%': { backgroundPosition: '100% 50%' },
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-20px)' },
                        },
                        shake: {
                            '10%, 90%': { transform: 'translate3d(-1px, 0, 0)' },
                            '20%, 80%': { transform: 'translate3d(2px, 0, 0)' },
                            '30%, 50%, 70%': { transform: 'translate3d(-4px, 0, 0)' },
                            '40%, 60%': { transform: 'translate3d(4px, 0, 0)' }
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            background: #020617;
            overflow-x: hidden;
        }
        
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .glass-strong {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(99, 102, 241, 0.2);
        }
        
        .gradient-text {
            background: linear-gradient(135deg, #6366f1 0%, #ec4899 50%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }
        
        .video-progress {
            background: linear-gradient(90deg, #6366f1 0%, #ec4899 100%);
        }
        
        .file-upload-area {
            border: 2px dashed rgba(99, 102, 241, 0.3);
            transition: all 0.3s ease;
        }
        
        .file-upload-area:hover, .file-upload-area.dragover {
            border-color: #6366f1;
            background: rgba(99, 102, 241, 0.1);
        }
        
        .otp-input {
            letter-spacing: 0.5em;
            text-align: center;
        }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0f172a;
        }
        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }
        
        .lesson-card {
            transition: all 0.3s ease;
        }
        .lesson-card:hover {
            transform: translateX(5px);
        }
        
        .locked {
            opacity: 0.5;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <canvas id="canvas-container"></canvas>

    <script type="text/babel">
        const { useState, useEffect, useRef, createContext, useContext } = React;
        const { motion, AnimatePresence } = window.Motion;
        
        // Auth Context
        const AuthContext = createContext(null);
        
        // OTP Generation (Simulating Google Authenticator)
        const generateSecret = () => {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ234567';
            let secret = '';
            for (let i = 0; i < 16; i++) {
                secret += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return secret;
        };
        
        const generateTOTP = (secret) => {
            // Simplified TOTP simulation - in production use proper crypto library
            const timeStep = Math.floor(Date.now() / 30000); // 30 second window
            let code = '';
            for (let i = 0; i < 6; i++) {
                code += Math.floor(Math.random() * 10);
            }
            return code;
        };
        
        // Particle Background
        const initParticles = () => {
            const canvas = document.getElementById('canvas-container');
            const ctx = canvas.getContext('2d');
            
            const resize = () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            };
            resize();
            window.addEventListener('resize', resize);
            
            const particles = [];
            const particleCount = 100;
            
            class Particle {
                constructor() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.size = Math.random() * 2 + 0.5;
                    this.speedX = Math.random() * 0.5 - 0.25;
                    this.speedY = Math.random() * 0.5 - 0.25;
                    this.opacity = Math.random() * 0.5 + 0.2;
                }
                
                update() {
                    this.x += this.speedX;
                    this.y += this.speedY;
                    
                    if (this.x > canvas.width) this.x = 0;
                    if (this.x < 0) this.x = canvas.width;
                    if (this.y > canvas.height) this.y = 0;
                    if (this.y < 0) this.y = canvas.height;
                }
                
                draw() {
                    ctx.fillStyle = `rgba(99, 102, 241, ${this.opacity})`;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
            
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
            
            const animate = () => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                particles.forEach((p1, i) => {
                    particles.slice(i + 1).forEach(p2 => {
                        const dx = p1.x - p2.x;
                        const dy = p1.y - p2.y;
                        const distance = Math.sqrt(dx * dx + dy * dy);
                        
                        if (distance < 150) {
                            ctx.strokeStyle = `rgba(99, 102, 241, ${0.1 * (1 - distance / 150)})`;
                            ctx.lineWidth = 1;
                            ctx.beginPath();
                            ctx.moveTo(p1.x, p1.y);
                            ctx.lineTo(p2.x, p2.y);
                            ctx.stroke();
                        }
                    });
                });
                
                particles.forEach(p => {
                    p.update();
                    p.draw();
                });
                
                requestAnimationFrame(animate);
            };
            animate();
        };
        
        // WhatsApp Notification Function
        const sendWhatsAppNotification = (studentData) => {
            const phone = '94762196055'; // Admin WhatsApp number
            const message = `🔔 *New Registration - Aura AI*%0A%0A` +
                          `*Name:* ${studentData.name}%0A` +
                          `*Email:* ${studentData.email}%0A` +
                          `*Phone:* ${studentData.phone}%0A` +
                          `*Amount:* Rs. 9,500%0A` +
                          `*Time:* ${new Date().toLocaleString()}%0A%0A` +
                          `Please verify payment and activate account.`;
            
            window.open(`https://wa.me/${phone}?text=${message}`, '_blank');
        };
        
        // Icon Component
        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            
            return <i data-lucide={name} width={size} height={size} className={className} style={{display: 'inline-block'}}></i>;
        };
        
        // Navigation
        const Navigation = () => {
            const { user, logout, isLoggedIn } = useContext(AuthContext);
            const [scrolled, setScrolled] = useState(false);
            const [currentPage, setCurrentPage] = useState('home');
            
            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);
            
            const navItems = [
                { id: 'home', label: 'මුල් පිටුව', icon: 'home' },
                { id: 'courses', label: 'පාඨමාලා', icon: 'book-open', protected: true },
                { id: 'about', label: 'අපි ගැන', icon: 'info' },
            ];
            
            const handleNav = (id) => {
                if (navItems.find(item => item.id === id)?.protected && !isLoggedIn) {
                    setCurrentPage('auth');
                } else {
                    setCurrentPage(id);
                }
                window.dispatchEvent(new CustomEvent('navigate', { detail: id }));
            };
            
            return (
                <motion.nav 
                    initial={{ y: -100 }}
                    animate={{ y: 0 }}
                    className={`fixed top-0 left-0 right-0 z-50 transition-all duration-300 ${scrolled ? 'glass-strong py-3' : 'py-6 bg-transparent'}`}
                >
                    <div className="max-w-7xl mx-auto px-6 flex items-center justify-between">
                        <motion.div 
                            className="flex items-center gap-3 cursor-pointer"
                            onClick={() => handleNav('home')}
                            whileHover={{ scale: 1.05 }}
                        >
                            <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 flex items-center justify-center">
                                <span className="text-white font-bold text-xl">A</span>
                            </div>
                            <span className="text-xl font-bold text-white">
                                Aura <span className="gradient-text">AI</span>
                            </span>
                        </motion.div>
                        
                        <div className="hidden md:flex items-center gap-8">
                            {navItems.map((item) => (
                                <motion.button
                                    key={item.id}
                                    onClick={() => handleNav(item.id)}
                                    className={`flex items-center gap-2 text-sm font-medium transition-colors ${currentPage === item.id ? 'text-indigo-400' : 'text-gray-400 hover:text-white'}`}
                                    whileHover={{ scale: 1.05 }}
                                    whileTap={{ scale: 0.95 }}
                                >
                                    <Icon name={item.icon} size={18} />
                                    {item.label}
                                </motion.button>
                            ))}
                        </div>
                        
                        <div className="flex items-center gap-4">
                            {isLoggedIn ? (
                                <motion.div 
                                    className="flex items-center gap-3 glass px-4 py-2 rounded-full cursor-pointer"
                                    onClick={() => handleNav('dashboard')}
                                    whileHover={{ scale: 1.05 }}
                                >
                                    {user?.profilePhoto ? (
                                        <img src={user.profilePhoto} alt="Profile" className="w-8 h-8 rounded-full object-cover" />
                                    ) : (
                                        <div className="w-8 h-8 rounded-full bg-gradient-to-br from-indigo-500 to-purple-500 flex items-center justify-center text-white text-sm font-bold">
                                            {user?.name?.[0] || 'U'}
                                        </div>
                                    )}
                                    <span className="text-white text-sm hidden sm:block">{user?.name || 'Student'}</span>
                                </motion.div>
                            ) : (
                                <motion.button
                                    onClick={() => handleNav('auth')}
                                    className="px-6 py-2.5 bg-gradient-to-r from-indigo-600 to-purple-600 text-white rounded-full font-medium text-sm hover:shadow-lg hover:shadow-indigo-500/25 transition-all"
                                    whileHover={{ scale: 1.05 }}
                                    whileTap={{ scale: 0.95 }}
                                >
                                    Login / Register
                                </motion.button>
                            )}
                        </div>
                    </div>
                </motion.nav>
            );
        };
        
        // Hero Section
        const Hero = () => {
            const handleStart = () => {
                window.dispatchEvent(new CustomEvent('navigate', { detail: 'auth' }));
            };
            
            return (
                <section className="min-h-screen flex items-center justify-center relative overflow-hidden pt-20">
                    <div className="max-w-7xl mx-auto px-6 grid lg:grid-cols-2 gap-12 items-center">
                        <motion.div
                            initial={{ opacity: 0, x: -50 }}
                            animate={{ opacity: 1, x: 0 }}
                            transition={{ duration: 0.8 }}
                        >
                            <motion.div 
                                className="inline-flex items-center gap-2 px-4 py-2 rounded-full glass mb-6"
                                initial={{ opacity: 0, y: 20 }}
                                animate={{ opacity: 1, y: 0 }}
                                transition={{ delay: 0.2 }}
                            >
                                <span className="w-2 h-2 rounded-full bg-green-400 animate-pulse"></span>
                                <span className="text-gray-300 text-sm">New AI Course 2024 Available</span>
                            </motion.div>
                            
                            <h1 className="text-5xl lg:text-7xl font-bold text-white leading-tight mb-6">
                                Master AI with <br />
                                <span className="gradient-text">Aura Creations</span>
                            </h1>
                            
                            <p className="text-gray-400 text-lg mb-8 max-w-lg leading-relaxed">
                                50+ Professional Video Lessons • Sinhala Medium • Lifetime Access • 
                                Certificate Included • Rs. 9,500 Only
                            </p>
                            
                            <div className="flex flex-wrap gap-4">
                                <motion.button
                                    onClick={handleStart}
                                    className="px-8 py-4 bg-gradient-to-r from-indigo-600 via-purple-600 to-pink-600 text-white rounded-full font-semibold text-lg hover:shadow-2xl hover:shadow-purple-500/25 transition-all flex items-center gap-2"
                                    whileHover={{ scale: 1.05 }}
                                    whileTap={{ scale: 0.95 }}
                                >
                                    <Icon name="play-circle" size={20} />
                                    Start Learning Now
                                </motion.button>
                            </div>
                            
                            <div className="mt-12 flex items-center gap-8">
                                <div>
                                    <div className="text-3xl font-bold text-white">500+</div>
                                    <div className="text-gray-500 text-sm">Students Enrolled</div>
                                </div>
                                <div className="w-px h-12 bg-gray-700"></div>
                                <div>
                                    <div className="text-3xl font-bold text-white">50+</div>
                                    <div className="text-gray-500 text-sm">Video Lessons</div>
                                </div>
                            </div>
                        </motion.div>
                        
                        <motion.div
                            initial={{ opacity: 0, x: 50 }}
                            animate={{ opacity: 1, x: 0 }}
                            transition={{ duration: 0.8 }}
                            className="relative"
                        >
                            <div className="relative z-10">
                                <div className="gradient-border p-1 rounded-3xl">
                                    <div className="bg-aura-dark p-8 rounded-3xl">
                                        <div className="aspect-video rounded-2xl bg-gradient-to-br from-indigo-900/50 to-purple-900/50 flex items-center justify-center relative overflow-hidden">
                                            <div className="absolute inset-0 bg-gradient-to-br from-indigo-600/20 to-purple-600/20 animate-pulse"></div>
                                            <motion.div 
                                                className="w-20 h-20 rounded-full bg-white/10 backdrop-blur-sm flex items-center justify-center border border-white/20"
                                                whileHover={{ scale: 1.1 }}
                                            >
                                                <Icon name="play" size={32} className="text-white ml-1" />
                                            </motion.div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div className="absolute -inset-4 bg-gradient-to-r from-indigo-600 to-purple-600 opacity-30 blur-3xl rounded-full animate-pulse-slow"></div>
                        </motion.div>
                    </div>
                </section>
            );
        };
        
        // File Upload Component
        const FileUpload = ({ onFileSelect, accept = "image/*,application/pdf", label = "Upload File" }) => {
            const [dragActive, setDragActive] = useState(false);
            const [fileName, setFileName] = useState('');
            const inputRef = useRef(null);
            
            const handleDrag = (e) => {
                e.preventDefault();
                e.stopPropagation();
                if (e.type === "dragenter" || e.type === "dragover") {
                    setDragActive(true);
                } else if (e.type === "dragleave") {
                    setDragActive(false);
                }
            };
            
            const handleDrop = (e) => {
                e.preventDefault();
                e.stopPropagation();
                setDragActive(false);
                if (e.dataTransfer.files && e.dataTransfer.files[0]) {
                    handleFile(e.dataTransfer.files[0]);
                }
            };
            
            const handleChange = (e) => {
                e.preventDefault();
                if (e.target.files && e.target.files[0]) {
                    handleFile(e.target.files[0]);
                }
            };
            
            const handleFile = (file) => {
                setFileName(file.name);
                // Convert to base64 for preview/storage
                const reader = new FileReader();
                reader.onload = (e) => {
                    onFileSelect(e.target.result);
                };
                reader.readAsDataURL(file);
            };
            
            return (
                <div 
                    className={`file-upload-area rounded-xl p-6 text-center cursor-pointer ${dragActive ? 'dragover' : ''}`}
                    onDragEnter={handleDrag}
                    onDragLeave={handleDrag}
                    onDragOver={handleDrag}
                    onDrop={handleDrop}
                    onClick={() => inputRef.current?.click()}
                >
                    <input
                        ref={inputRef}
                        type="file"
                        className="hidden"
                        accept={accept}
                        onChange={handleChange}
                    />
                    {fileName ? (
                        <div className="flex items-center justify-center gap-2 text-indigo-400">
                            <Icon name="file-check" size={24} />
                            <span className="text-sm font-medium">{fileName}</span>
                        </div>
                    ) : (
                        <>
                            <Icon name="upload" size={32} className="mx-auto text-gray-500 mb-2" />
                            <p className="text-gray-400 text-sm mb-1">{label}</p>
                            <p className="text-gray-600 text-xs">Drag & drop or click to browse</p>
                        </>
                    )}
                </div>
            );
        };
        
        // Registration Component
        const Registration = ({ onSuccess }) => {
            const [step, setStep] = useState(1);
            const [formData, setFormData] = useState({
                name: '',
                email: '',
                phone: '',
                password: '',
                profilePhoto: null,
                receipt: null,
                secret: '',
                otp: ''
            });
            const [generatedOTP, setGeneratedOTP] = useState('');
            const [error, setError] = useState('');
            const [qrCode, setQrCode] = useState('');
            const [timeLeft, setTimeLeft] = useState(30);
            
            useEffect(() => {
                if (step === 3) {
                    // Generate secret and OTP
                    const secret = generateSecret();
                    const otp = generateTOTP(secret);
                    setGeneratedOTP(otp);
                    setFormData(prev => ({ ...prev, secret }));
                    
                    // Generate QR Code
                    setTimeout(() => {
                        const qrContainer = document.getElementById('qrcode');
                        if (qrContainer) {
                            qrContainer.innerHTML = '';
                            new QRCode(qrContainer, {
                                text: `otpauth://totp/AuraAI:${formData.email}?secret=${secret}&issuer=AuraAI`,
                                width: 128,
                                height: 128,
                                colorDark: "#000000",
                                colorLight: "#ffffff",
                                correctLevel: QRCode.CorrectLevel.H
                            });
                        }
                    }, 100);
                    
                    // Timer
                    const timer = setInterval(() => {
                        setTimeLeft(prev => {
                            if (prev <= 1) {
                                const newOtp = generateTOTP(secret);
                                setGeneratedOTP(newOtp);
                                return 30;
                            }
                            return prev - 1;
                        });
                    }, 1000);
                    
                    return () => clearInterval(timer);
                }
            }, [step]);
            
            const validateStep = () => {
                setError('');
                if (step === 1) {
                    if (!formData.name || !formData.email || !formData.phone || !formData.password) {
                        setError('All fields are required');
                        return false;
                    }
                    if (formData.password.length < 6) {
                        setError('Password must be at least 6 characters');
                        return false;
                    }
                } else if (step === 2) {
                    if (!formData.receipt) {
                        setError('Please upload payment receipt');
                        return false;
                    }
                } else if (step === 3) {
                    if (formData.otp !== generatedOTP) {
                        setError('Invalid authentication code. Please check Google Authenticator app.');
                        return false;
                    }
                }
                return true;
            };
            
            const handleNext = () => {
                if (validateStep()) {
                    if (step < 3) {
                        setStep(step + 1);
                    } else {
                        // Complete registration
                        const userData = {
                            name: formData.name,
                            email: formData.email,
                            phone: formData.phone,
                            profilePhoto: formData.profilePhoto,
                            receipt: formData.receipt,
                            secret: formData.secret,
                            registeredAt: new Date().toISOString()
                        };
                        
                        // Store in localStorage (simulating database)
                        const users = JSON.parse(localStorage.getItem('aura_users') || '[]');
                        if (users.find(u => u.email === formData.email)) {
                            setError('Email already registered');
                            return;
                        }
                        users.push(userData);
                        localStorage.setItem('aura_users', JSON.stringify(users));
                        
                        // Send WhatsApp notification
                        sendWhatsAppNotification(userData);
                        
                        onSuccess(userData);
                    }
                }
            };
            
            return (
                <div className="w-full max-w-md mx-auto">
                    <div className="glass-strong p-8 rounded-3xl">
                        <div className="text-center mb-8">
                            <h2 className="text-2xl font-bold text-white mb-2">Create Account</h2>
                            <p className="text-gray-400 text-sm">Step {step} of 3</p>
                        </div>
                        
                        <div className="flex gap-2 mb-6">
                            {[1, 2, 3].map((s) => (
                                <div key={s} className={`flex-1 h-1 rounded-full transition-all ${s <= step ? 'bg-gradient-to-r from-indigo-500 to-purple-500' : 'bg-gray-700'}`}></div>
                            ))}
                        </div>
                        
                        {error && (
                            <motion.div 
                                initial={{ opacity: 0, y: -10 }}
                                animate={{ opacity: 1, y: 0 }}
                                className="mb-4 p-3 bg-red-500/20 border border-red-500/30 rounded-xl text-red-400 text-sm flex items-center gap-2"
                            >
                                <Icon name="alert-circle" size={16} />
                                {error}
                            </motion.div>
                        )}
                        
                        <div className="space-y-4">
                            {step === 1 && (
                                <>
                                    <div>
                                        <label className="block text-gray-400 text-sm mb-2">Full Name *</label>
                                        <input 
                                            type="text" 
                                            className="w-full px-4 py-3 rounded-xl bg-gray-800/50 border border-gray-700 text-white focus:border-indigo-500 focus:outline-none transition-colors"
                                            placeholder="John Doe"
                                            value={formData.name}
                                            onChange={(e) => setFormData({...formData, name: e.target.value})}
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-gray-400 text-sm mb-2">Email *</label>
                                        <input 
                                            type="email" 
                                            className="w-full px-4 py-3 rounded-xl bg-gray-800/50 border border-gray-700 text-white focus:border-indigo-500 focus:outline-none transition-colors"
                                            placeholder="your@email.com"
                                            value={formData.email}

                                                                <button
                                                                    key={lesson.id}
                                                                    onClick={() => handleLessonClick(lesson, lIdx)}
                                                                    className={`w-full text-left p-2 rounded-lg text-xs flex items-center gap-2 transition-all ${isActive ? 'bg-indigo-500/20 text-indigo-300' : isCompleted ? 'text-green-400' : isLocked ? 'text-gray-600 cursor-not-allowed' : 'text-gray-400 hover:text-white'}`}
                                                                    disabled={isLocked}
                                                                >
                                                                    {isCompleted ? <Icon name="check-circle" size={12} /> : 
                                                                     isLocked ? <Icon name="lock" size={12} /> : 
                                                                     <Icon name="play-circle" size={12} />}
                                                                    <span className="flex-1 truncate">{lesson.title}</span>
                                                                    <span className="text-gray-600">{lesson.duration}</span>
                                                                </button>
                                                            );
                                                        })}
                                                    </div>
                                                )}
                                            </div>
                                        ))}
                                    </div>
                                </motion.div>
                            </div>
                            
                            {/* Main Content */}
                            <div className="lg:col-span-2">
                                <motion.div
                                    initial={{ opacity: 0, y: 20 }}
                                    animate={{ opacity: 1, y: 0 }}
                                    className="glass-strong rounded-2xl overflow-hidden mb-6"
                                >
                                    {activeLesson ? (
                                        <>
                                            <div className="aspect-video bg-gray-900 relative">
                                                <div className="absolute inset-0 flex items-center justify-center">
                                                    {watching ? (
                                                        <div className="w-full h-full bg-gradient-to-br from-indigo-900 to-purple-900 flex items-center justify-center">
                                                            <div className="text-center">
                                                                <div className="w-20 h-20 rounded-full border-4 border-indigo-500 border-t-transparent animate-spin mx-auto mb-4"></div>
                                                                <p className="text-white">Playing: {activeLesson.title}</p>
                                                                <p className="text-gray-400 text-sm mt-2">Simulating video playback...</p>
                                                            </div>
                                                        </div>
                                                    ) : (
                                                        <div className="text-center">
                                                            <motion.div 
                                                                className="w-20 h-20 rounded-full bg-white/10 backdrop-blur-sm flex items-center justify-center mx-auto mb-4 cursor-pointer hover:scale-110 transition-transform"
                                                                whileHover={{ scale: 1.1 }}
                                                                onClick={() => setWatching(true)}
                                                            >
                                                                <Icon name="play" size={32} className="text-white ml-1" />
                                                            </motion.div>
                                                            <p className="text-gray-400">Click to start lesson</p>
                                                        </div>
                                                    )}
                                                </div>
                                                
                                                <div className="absolute bottom-0 left-0 right-0 p-4 bg-gradient-to-t from-black/90 to-transparent">
                                                    <div className="h-1 bg-gray-700 rounded-full overflow-hidden mb-2">
                                                        <div 
                                                            className="h-full video-progress rounded-full transition-all"
                                                            style={{ width: `${videoProgress}%` }}
                                                        ></div>
                                                    </div>
                                                    <div className="flex justify-between text-sm text-gray-300">
                                                        <span>{Math.round(videoProgress)}% watched</span>
                                                        <span>{activeLesson.duration}</span>
                                                    </div>
                                                </div>
                                            </div>
                                            
                                            <div className="p-6">
                                                <div className="flex items-center gap-3 mb-3">
                                                    {activeLesson.isQuiz && <span className="px-2 py-1 bg-yellow-500/20 text-yellow-400 text-xs rounded-lg">Quiz</span>}
                                                    {activeLesson.isProject && <span className="px-2 py-1 bg-purple-500/20 text-purple-400 text-xs rounded-lg">Project</span>}
                                                    {activeLesson.isCertification && <span className="px-2 py-1 bg-green-500/20 text-green-400 text-xs rounded-lg">Certificate</span>}
                                                </div>
                                                <h2 className="text-xl font-bold text-white mb-2">{activeLesson.title}</h2>
                                                <p className="text-gray-400 text-sm mb-4">
                                                    Complete this lesson to unlock the next one. Watch the full video and mark as complete.
                                                </p>
                                                <div className="flex gap-3">
                                                    {!completedLessons.includes(activeLesson.id) ? (
                                                        <button 
                                                            onClick={handleVideoComplete}
                                                            className="px-4 py-2 bg-gradient-to-r from-indigo-600 to-purple-600 text-white rounded-lg text-sm font-medium hover:shadow-lg transition-all flex items-center gap-2"
                                                        >
                                                            <Icon name="check" size={16} />
                                                            Mark as Complete
                                                        </button>
                                                    ) : (
                                                        <span className="px-4 py-2 bg-green-500/20 text-green-400 rounded-lg text-sm font-medium flex items-center gap-2">
                                                            <Icon name="check-circle" size={16} />
                                                            Completed
                                                        </span>
                                                    )}
                                                    <button className="px-4 py-2 glass text-white rounded-lg text-sm font-medium hover:bg-white/10 transition-all flex items-center gap-2">
                                                        <Icon name="download" size={16} />
                                                        Resources
                                                    </button>
                                                </div>
                                            </div>
                                        </>
                                    ) : (
                                        <div className="aspect-video flex items-center justify-center">
                                            <div className="text-center">
                                                <div className="w-20 h-20 rounded-full bg-indigo-500/20 flex items-center justify-center mx-auto mb-4">
                                                    <Icon name="book-open" size={32} className="text-indigo-400" />
                                                </div>
                                                <h3 className="text-white font-semibold mb-2">Select a Lesson</h3>
                                                <p className="text-gray-400 text-sm">Choose a lesson from the sidebar to start learning</p>
                                            </div>
                                        </div>
                                    )}
                                </motion.div>
                                
                                {activeLesson && (
                                    <motion.div
                                        initial={{ opacity: 0, y: 20 }}
                                        animate={{ opacity: 1, y: 0 }}
                                        transition={{ delay: 0.1 }}
                                        className="glass rounded-2xl p-6"
                                    >
                                        <h3 className="text-white font-semibold mb-4">Lesson Notes</h3>
                                        <div className="space-y-3 text-sm text-gray-400">
                                            <p>• This lesson covers key concepts in {modules[activeModule].title}</p>
                                            <p>• Watch the complete video to unlock the next lesson</p>
                                            <p>• Download resources for offline reference</p>
                                            <p>• Complete the quiz after watching (if applicable)</p>
                                        </div>
                                    </motion.div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };
        
        // Main App
        const App = () => {
            const [currentPage, setCurrentPage] = useState('home');
            const [user, setUser] = useState(null);
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            
            useEffect(() => {
                initParticles();
                
                // Check for saved session
                const savedUser = localStorage.getItem('aura_current_user');
                if (savedUser) {
                    setUser(JSON.parse(savedUser));
                    setIsLoggedIn(true);
                }
                
                // Listen for navigation events
                const handleNav = (e) => {
                    const page = e.detail;
                    if (page === 'courses' && !isLoggedIn && !savedUser) {
                        setCurrentPage('auth');
                    } else if (page === 'dashboard' && !isLoggedIn && !savedUser) {
                        setCurrentPage('auth');
                    } else {
                        setCurrentPage(page);
                    }
                };
                
                window.addEventListener('navigate', handleNav);
                return () => window.removeEventListener('navigate', handleNav);
            }, [isLoggedIn]);
            
            const handleLogin = (userData) => {
                setUser(userData);
                setIsLoggedIn(true);
                localStorage.setItem('aura_current_user', JSON.stringify(userData));
                setCurrentPage('dashboard');
            };
            
            const handleLogout = () => {
                setUser(null);
                setIsLoggedIn(false);
                localStorage.removeItem('aura_current_user');
                setCurrentPage('home');
            };
            
            const renderPage = () => {
                switch(currentPage) {
                    case 'home':
                        return <Hero />;
                    case 'auth':
                        return <AuthPage onLogin={handleLogin} />;
                    case 'dashboard':
                        return isLoggedIn ? <Dashboard onLogout={handleLogout} /> : <AuthPage onLogin={handleLogin} />;
                    case 'courses':
                        return isLoggedIn ? <Dashboard onLogout={handleLogout} /> : <AuthPage onLogin={handleLogin} />;
                    case 'about':
                        return (
                            <div className="min-h-screen flex items-center justify-center pt-20 px-6">
                                <div className="max-w-3xl mx-auto text-center">
                                    <h1 className="text-4xl font-bold text-white mb-6">About <span className="gradient-text">Aura AI</span></h1>
                                    <p className="text-gray-400 text-lg leading-relaxed mb-8">
                                        Aura AI Creations is Sri Lanka's premier AI education platform. We provide comprehensive video courses in Sinhala medium, covering everything from basic AI concepts to advanced business applications.
                                    </p>
                                    <div className="grid md:grid-cols-3 gap-6 mt-12">
                                        <div className="glass p-6 rounded-2xl">
                                            <div className="text-3xl font-bold text-white mb-2">50+</div>
                                            <div className="text-gray-400">Video Lessons</div>
                                        </div>
                                        <div className="glass p-6 rounded-2xl">
                                            <div className="text-3xl font-bold text-white mb-2">500+</div>
                                            <div className="text-gray-400">Students</div>
                                        </div>
                                        <div className="glass p-6 rounded-2xl">
                                            <div className="text-3xl font-bold text-white mb-2">100%</div>
                                            <div className="text-gray-400">Sinhala Medium</div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        );
                    default:
                        return <Hero />;
                }
            };
            
            return (
                <AuthContext.Provider value={{ user, isLoggedIn, logout: handleLogout }}>
                    <div className="min-h-screen text-gray-100 font-sans">
                        <Navigation />
                        <AnimatePresence mode="wait">
                            <motion.main
                                key={currentPage}
                                initial={{ opacity: 0, y: 20 }}
                                animate={{ opacity: 1, y: 0 }}
                                exit={{ opacity: 0, y: -20 }}
                                transition={{ duration: 0.3 }}
                                className="relative z-10"
                            >
                                {renderPage()}
                            </motion.main>
                        </AnimatePresence>
                        
                        <footer className="border-t border-gray-800 py-12 mt-20 relative z-10">
                            <div className="max-w-7xl mx-auto px-6">
                                <div className="grid md:grid-cols-4 gap-8 mb-8">
                                    <div>
                                        <div className="flex items-center gap-2 mb-4">
                                            <div className="w-8 h-8 rounded-lg bg-gradient-to-br from-indigo-500 to-purple-500 flex items-center justify-center text-white font-bold">A</div>
                                            <span className="text-lg font-bold text-white">Aura AI</span>
                                        </div>
                                        <p className="text-gray-400 text-sm">Professional AI education platform for Sri Lankan students.</p>
                                    </div>
                                    <div>
                                        <h4 className="text-white font-semibold mb-4">Contact</h4>
                                        <ul className="space-y-2 text-sm text-gray-400">
                                            <li>WhatsApp: 076 219 6055</li>
                                            <li>Colombo, Sri Lanka</li>
                                        </ul>
                                    </div>
                                    <div>
                                        <h4 className="text-white font-semibold mb-4">Social</h4>
                                        <div className="flex gap-3">
                                            <a href="https://www.facebook.com/Auraaiareations" target="_blank" className="w-10 h-10 rounded-full glass flex items-center justify-center hover:bg-blue-600 transition-colors">
                                                <Icon name="facebook" size={18} />
                                            </a>
                                            <a href="https://www.tiktok.com/@ai_podda2" target="_blank" className="w-10 h-10 rounded-full glass flex items-center justify-center hover:bg-black transition-colors">
                                                <Icon name="music" size={18} />
                                            </a>
                                            <a href="https://wa.me/94762196055" target="_blank" className="w-10 h-10 rounded-full glass flex items-center justify-center hover:bg-green-600 transition-colors">
                                                <Icon name="message-circle" size={18} />
                                            </a>
                                        </div>
                                    </div>
                                </div>
                                <div className="border-t border-gray-800 pt-8 text-center text-gray-500 text-sm">
                                    © 2024 Aura AI Creations. All rights reserved.
                                </div>
                            </div>
                        </footer>
                    </div>
                </AuthContext.Provider>
            );
        };
        
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
