<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura AI Creations - AI Video Course Platform</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Framer Motion -->
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- PDF Generation Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <!-- Chart.js for Analytics -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Noto+Sans+Sinhala:wght@400;500;600;700&family=Cinzel:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'Noto Sans Sinhala', 'sans-serif'],
                        cinzel: ['Cinzel', 'serif'],
                        playfair: ['Playfair Display', 'serif'],
                    },
                    colors: {
                        aura: {
                            primary: '#ff4ecd',
                            secondary: '#8b5cf6',
                            accent: '#00d4ff',
                            dark: '#00153e',
                            darker: '#000a1f',
                        }
                    },
                    animation: {
                        'gradient': 'gradient 8s linear infinite',
                        'float': 'float 6s ease-in-out infinite',
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'shake': 'shake 0.5s cubic-bezier(.36,.07,.19,.97) both',
                        'glow': 'glow 2s ease-in-out infinite alternate',
                        'slide-up': 'slideUp 0.8s ease-out',
                        'fade-in': 'fadeIn 1s ease-out',
                        'scale-in': 'scaleIn 0.5s ease-out',
                        'bounce-slow': 'bounce 3s infinite',
                        'spin-slow': 'spin 8s linear infinite',
                        'orbit': 'orbit 4s linear infinite',
                        'photo-glow': 'photoGlow 2s ease-in-out infinite',
                        'border-run': 'borderRun 2s linear infinite',
                        'btn-pulse': 'btnPulse 2s ease-in-out infinite',
                        'btn-shine': 'btnShine 2s linear infinite',
                        'photo-shimmer': 'photoShimmer 3s ease-in-out infinite',
                        'photo-rotate': 'photoRotate 20s linear infinite',
                        'desc-fade': 'descFade 0.6s ease-out forwards',
                    },
                    keyframes: {
                        gradient: {
                            '0%, 100%': { backgroundPosition: '0% 50%' },
                            '50%': { backgroundPosition: '100% 50%' },
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-20px)' },
                        },
                        shake: {
                            '10%, 90%': { transform: 'translate3d(-1px, 0, 0)' },
                            '20%, 80%': { transform: 'translate3d(2px, 0, 0)' },
                            '30%, 50%, 70%': { transform: 'translate3d(-4px, 0, 0)' },
                            '40%, 60%': { transform: 'translate3d(4px, 0, 0)' }
                        },
                        glow: {
                            '0%': { boxShadow: '0 0 5px #ff4ecd, 0 0 10px #ff4ecd' },
                            '100%': { boxShadow: '0 0 20px #ff4ecd, 0 0 30px #8b5cf6' }
                        },
                        slideUp: {
                            '0%': { transform: 'translateY(50px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' },
                        },
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        scaleIn: {
                            '0%': { transform: 'scale(0.8)', opacity: '0' },
                            '100%': { transform: 'scale(1)', opacity: '1' },
                        },
                        orbit: {
                            '0%': { transform: 'rotate(0deg) translateX(80px) rotate(0deg)' },
                            '100%': { transform: 'rotate(360deg) translateX(80px) rotate(-360deg)' },
                        },
                        photoGlow: {
                            '0%, 100%': { boxShadow: '0 0 5px #22c55e, 0 0 10px #22c55e, 0 0 15px #22c55e' },
                            '50%': { boxShadow: '0 0 20px #22c55e, 0 0 30px #22c55e, 0 0 40px #22c55e' },
                        },
                        borderRun: {
                            '0%': { backgroundPosition: '0% 50%' },
                            '100%': { backgroundPosition: '200% 50%' },
                        },
                        btnPulse: {
                            '0%, 100%': { transform: 'scale(1)' },
                            '50%': { transform: 'scale(1.05)' },
                        },
                        btnShine: {
                            '0%': { left: '-100%' },
                            '100%': { left: '200%' },
                        },
                        photoShimmer: {
                            '0%': { backgroundPosition: '-200% center' },
                            '100%': { backgroundPosition: '200% center' },
                        },
                        photoRotate: {
                            '0%': { transform: 'rotate(0deg)' },
                            '100%': { transform: 'rotate(360deg)' },
                        },
                        descFade: {
                            '0%': { opacity: '0', transform: 'translateY(20px)', filter: 'blur(10px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)', filter: 'blur(0)' },
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            background: #000a1f;
            overflow-x: hidden;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }
        
        @media print {
            body { display: none !important; }
        }
        
        .glass {
            background: rgba(0, 21, 62, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 212, 255, 0.1);
        }
        
        .glass-strong {
            background: rgba(0, 21, 62, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 78, 205, 0.2);
        }
        
        .gradient-text {
            background: linear-gradient(135deg, #ff4ecd 0%, #00d4ff 50%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }
        
        .otp-input {
            letter-spacing: 0.5em;
            text-align: center;
        }
        
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #00153e;
        }
        ::-webkit-scrollbar-thumb {
            background: #ff4ecd;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #00d4ff;
        }
        
        .lesson-card {
            transition: all 0.3s ease;
        }
        .lesson-card:hover {
            transform: translateX(5px);
        }
        
        .locked {
            opacity: 0.5;
            pointer-events: none;
        }
        
        .logo-container {
            animation: float 6s ease-in-out infinite;
        }
        
        .gradient-border {
            position: relative;
            background: linear-gradient(135deg, #ff4ecd, #00d4ff, #8b5cf6);
            padding: 2px;
            border-radius: 1rem;
        }
        
        .gradient-border::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, #ff4ecd, #00d4ff, #8b5cf6);
            border-radius: inherit;
            filter: blur(10px);
            opacity: 0.5;
            z-index: -1;
        }
        
        .video-thumbnail {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 1rem;
        }
        
        .unlock-animation {
            animation: unlockPulse 2s ease-in-out;
        }
        
        @keyframes unlockPulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 78, 205, 0.7); }
            50% { transform: scale(1.05); box-shadow: 0 0 20px 10px rgba(255, 78, 205, 0.3); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 78, 205, 0); }
        }
        
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background: #ff4ecd;
            position: absolute;
            animation: confetti-fall 3s ease-out forwards;
        }
        
        @keyframes confetti-fall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        .ai-intro-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9999;
            background: linear-gradient(135deg, #000a1f 0%, #00153e 50%, #1e1b4b 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .ai-particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #ff4ecd;
            border-radius: 50%;
            animation: particle-float 3s ease-in-out infinite;
        }

        @keyframes particle-float {
            0%, 100% { transform: translateY(0) scale(1); opacity: 0.5; }
            50% { transform: translateY(-20px) scale(1.5); opacity: 1; }
        }

        .typing-cursor::after {
            content: '|';
            animation: blink 1s infinite;
            color: #ff4ecd;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        .neural-network {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0.1;
        }

        .scan-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #ff4ecd, transparent);
            animation: scan 3s linear infinite;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }

        .pulse-ring {
            position: absolute;
            border: 2px solid rgba(255, 78, 205, 0.3);
            border-radius: 50%;
            animation: pulse-ring 2s ease-out infinite;
        }

        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 1; }
            100% { transform: scale(2); opacity: 0; }
        }

        .glitch-text {
            position: relative;
            animation: glitch 2s infinite;
        }

        @keyframes glitch {
            0%, 100% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
        }

        .device-warning {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }

        .photo-glow-ring {
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            border: 2px solid transparent;
            background: linear-gradient(135deg, #22c55e, #16a34a, #15803d) border-box;
            -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            animation: photoGlow 2s ease-in-out infinite;
        }

        @keyframes photoGlow {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.02); }
        }

        .lesson-item {
            transition: all 0.3s ease;
        }
        .lesson-item:hover {
            transform: translateX(8px);
            background: rgba(255, 78, 205, 0.1);
        }

        .lesson-active {
            background: rgba(239, 68, 68, 0.2) !important;
            border-left: 3px solid #ef4444;
        }

        .module-card {
            transition: all 0.3s ease;
        }
        .module-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 40px rgba(255, 78, 205, 0.1);
        }

        .stat-card {
            transition: all 0.3s ease;
        }
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(255, 78, 205, 0.2);
        }

        .anti-screenshot {
            position: relative;
        }
        .anti-screenshot::after {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0,0,0,0.03) 2px,
                rgba(0,0,0,0.03) 4px
            );
            pointer-events: none;
            z-index: 100;
        }
        
        .tip-icon-container {
            position: relative;
            overflow: hidden;
        }
        
        .tip-icon-container::before {
            content: '';
            position: absolute;
            inset: -50%;
            background: conic-gradient(from 0deg, transparent, rgba(255, 78, 205, 0.3), transparent);
            animation: rotate 3s linear infinite;
        }
        
        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .tip-card {
            position: relative;
            overflow: hidden;
        }
        
        .tip-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 78, 205, 0.1), transparent);
            animation: shimmer 3s infinite;
        }
        
        @keyframes shimmer {
            0% { left: -100%; }
            50% { left: 100%; }
            100% { left: 100%; }
        }
        
        .floating-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(40px);
            opacity: 0.4;
            animation: orb-float 8s ease-in-out infinite;
        }
        
        @keyframes orb-float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
        }
        
        .tip-number {
            position: relative;
            display: inline-block;
        }
        
        .tip-number::after {
            content: '';
            position: absolute;
            inset: -8px;
            border-radius: 50%;
            border: 2px dashed rgba(255, 78, 205, 0.3);
            animation: spin-slow 10s linear infinite;
        }
        
        .security-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9998;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0,0,0,0.01) 2px,
                rgba(0,0,0,0.01) 4px
            );
        }
        
        .gallery-upload {
            position: relative;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .gallery-upload:hover {
            transform: scale(1.05);
        }
        
        .gallery-upload input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
            width: 100%;
            height: 100%;
        }

        /* Lesson Item Styles */
        .lesson-item-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 0.75rem;
            padding: 0.75rem 1rem;
            transition: all 0.3s ease;
            cursor: pointer;
            margin-bottom: 0.5rem;
        }

        .lesson-item-box:hover:not(.lesson-active):not(.lesson-completed) {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .lesson-item-box.lesson-active {
            background: rgba(239, 68, 68, 0.2) !important;
            border: 2px solid #ef4444 !important;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.3);
        }

        .lesson-item-box.lesson-completed {
            background: rgba(34, 197, 94, 0.15) !important;
            border: 1px solid rgba(34, 197, 94, 0.5) !important;
        }

        .lesson-item-box.lesson-locked {
            opacity: 0.4;
            cursor: not-allowed;
            pointer-events: none;
        }

        .lesson-text { color: #ffffff; font-size: 0.875rem; font-weight: 500; }
        .lesson-text-completed { color: #22c55e !important; font-weight: 600; }
        .lesson-text-active { color: #ffffff !important; font-weight: 700; }
        .lesson-text-locked { color: #9ca3af !important; }

        .lesson-icon { color: #ffffff; }
        .lesson-icon-completed { color: #22c55e !important; }
        .lesson-icon-active { color: #ef4444 !important; }
        .lesson-icon-locked { color: #6b7280 !important; }

        .lesson-item-wrapper { margin-bottom: 8px; }

        .video-4k-container {
            position: relative;
            width: 100%;
            background: #000;
            border-radius: 1rem;
            overflow: hidden;
        }

        .video-4k-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .profile-photo-container { position: relative; }
        .profile-photo-temp { animation: photoFadeIn 0.3s ease; }

        @keyframes photoFadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .btn-animated {
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        
        .btn-animated::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }
        
        .btn-animated:hover::before { left: 100%; }
        .btn-animated:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .btn-animated:active { transform: translateY(-1px); }
        
        .btn-green {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            box-shadow: 0 4px 15px rgba(34, 197, 94, 0.4);
        }
        .btn-green:hover { box-shadow: 0 8px 25px rgba(34, 197, 94, 0.6); }
        
        .btn-red {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4);
        }
        .btn-red:hover { box-shadow: 0 8px 25px rgba(239, 68, 68, 0.6); }
        
        .btn-shine-effect {
            position: relative;
            overflow: hidden;
        }
        
        .btn-shine-effect::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(to right, transparent 0%, rgba(255,255,255,0.1) 50%, transparent 100%);
            transform: rotate(30deg);
            animation: btnShine 3s infinite;
        }
        
        @keyframes btnShine {
            0% { transform: translateX(-100%) rotate(30deg); }
            100% { transform: translateX(100%) rotate(30deg); }
        }
        
        .flyer-container {
            position: relative;
            border-radius: 1.5rem;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(255, 78, 205, 0.3);
        }
        
        .flyer-container::before {
            content: '';
            position: absolute;
            inset: -3px;
            background: linear-gradient(135deg, #ff4ecd, #00d4ff, #8b5cf6, #ff9800);
            border-radius: inherit;
            z-index: -1;
            animation: borderRotate 3s linear infinite;
        }
        
        @keyframes borderRotate {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }
        
        .logo-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border: none !important;
            outline: none !important;
            box-shadow: none !important;
        }
        
        .nav-logo-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 0.5rem;
            border: none !important;
            outline: none !important;
            box-shadow: none !important;
        }
        
        .photo-animated-container {
            position: relative;
            border-radius: 1.5rem;
            overflow: hidden;
        }
        
        .photo-animated-container::before {
            content: '';
            position: absolute;
            inset: -4px;
            background: linear-gradient(45deg, #ff4ecd, #00d4ff, #8b5cf6, #ff9800, #22c55e, #ff4ecd);
            background-size: 400% 400%;
            border-radius: inherit;
            z-index: -1;
            animation: gradientShift 4s ease infinite;
        }
        
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .photo-shimmer-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,0.2) 45%, rgba(255,255,255,0.3) 50%, rgba(255,255,255,0.2) 55%, transparent 60%);
            background-size: 200% 100%;
            animation: photoShimmer 3s ease-in-out infinite;
            pointer-events: none;
            z-index: 10;
        }
        
        .photo-float-animation { animation: float 6s ease-in-out infinite; }
        
        .screen-protect { position: relative; }
        .screen-protect::before {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(0,0,0,0.02) 10px, rgba(0,0,0,0.02) 20px);
            pointer-events: none;
            z-index: 9997;
        }
        
        .live-stat-card {
            background: linear-gradient(135deg, rgba(0,21,62,0.8), rgba(139,92,246,0.2));
            border: 1px solid rgba(255,78,205,0.3);
            backdrop-filter: blur(10px);
        }
        
        .live-pulse { position: relative; }
        .live-pulse::after {
            content: '';
            position: absolute;
            width: 8px;
            height: 8px;
            background: #22c55e;
            border-radius: 50%;
            right: -12px;
            top: 50%;
            transform: translateY(-50%);
            animation: livePulse 2s infinite;
        }
        
        @keyframes livePulse {
            0% { box-shadow: 0 0 0 0 rgba(34,197,94,0.7); }
            70% { box-shadow: 0 0 0 10px rgba(34,197,94,0); }
            100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); }
        }
        
        @media (prefers-reduced-motion: no-preference) {
            .no-screen-record {
                -webkit-user-select: none;
                -moz-user-select: none;
                -ms-user-select: none;
                user-select: none;
            }
        }

        .video-player-wrapper {
            position: relative;
            width: 100%;
            background: #000;
            border-radius: 1rem;
            overflow: hidden;
        }

        .video-player-wrapper iframe {
            width: 100%;
            height: 100%;

        /* Success animation */
        .success-checkmark {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: block;
            stroke-width: 2;
            stroke: #22c55e;
            stroke-miterlimit: 10;
            margin: 10% auto;
            box-shadow: inset 0px 0px 0px #22c55e;
            animation: fill .4s ease-in-out .4s forwards, scale .3s ease-in-out .9s both;
        }

        .checkmark-circle {
            stroke-dasharray: 166;
            stroke-dashoffset: 166;
            stroke-width: 2;
            stroke-miterlimit: 10;
            stroke: #22c55e;
            fill: none;
            animation: stroke 0.6s cubic-bezier(0.65, 0, 0.45, 1) forwards;
        }

        .checkmark-check {
            transform-origin: 50% 50%;
            stroke-dasharray: 48;
            stroke-dashoffset: 48;
            animation: stroke 0.3s cubic-bezier(0.65, 0, 0.45, 1) 0.8s forwards;
        }

        @keyframes stroke { 100% { stroke-dashoffset: 0; } }
        @keyframes scale { 0%, 100% { transform: none; } 50% { transform: scale3d(1.1, 1.1, 1); } }
        @keyframes fill { 100% { box-shadow: inset 0px 0px 0px 30px #22c55e; } }

        /* Star field background for certificate */
        .star-field {
            position: absolute;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #000000;
            border-radius: 50%;
            animation: twinkle 3s ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* Holographic effect */
        .holographic {
            background: linear-gradient(135deg, 
                rgba(0,0,0,0.02) 0%, 
                rgba(255,255,255,0.05) 25%, 
                rgba(0,0,0,0.02) 50%, 
                rgba(255,255,255,0.05) 75%, 
                rgba(0,0,0,0.02) 100%);
            background-size: 400% 400%;
            animation: holographicShift 8s ease infinite;
        }

        @keyframes holographicShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Ripple effect for buttons */
        .ripple {
            position: relative;
            overflow: hidden;
        }

        .ripple::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            background-image: radial-gradient(circle, rgba(255,255,255,0.3) 10%, transparent 10.01%);
            background-repeat: no-repeat;
            background-position: 50%;
            transform: scale(10, 10);
            opacity: 0;
            transition: transform 0.5s, opacity 1s;
        }

        .ripple:active::after {
            transform: scale(0, 0);
            opacity: 0.3;
            transition: 0s;
        }

        /* Magnetic button effect */
        .magnetic-btn {
            transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        /* Text scramble effect */
        .scramble-text {
            font-family: 'Courier New', monospace;
        }

        /* 3D Card tilt effect */
        .tilt-card {
            transform-style: preserve-3d;
            transform: perspective(1000px);
        }

        /* Gradient text animation */
        .animated-gradient-text {
            background: linear-gradient(90deg, #000000, #333333, #000000, #333333);
            background-size: 300% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientTextMove 3s ease infinite;
        }

        @keyframes gradientTextMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Particle burst animation */
        .particle-burst {
            position: absolute;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            pointer-events: none;
        }

        /* Loading shimmer for certificate */
        .certificate-shimmer {
            position: absolute;
            inset: 0;
            background: linear-gradient(105deg, transparent 40%, rgba(0,0,0,0.03) 50%, transparent 60%);
            background-size: 200% 100%;
            animation: certShimmer 3s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes certShimmer {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }

        /* Notification Toast */

            right: 20px;
            z-index: 10000;

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, createContext, useContext } = React;
        const { motion, AnimatePresence } = window.Motion;
        
        const AuthContext = createContext(null);
        const FIXED_SECRET_KEY = 'SAKUNKAVEESHAVIP';
        const base32Chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ234567';
        
        const LOGO_URL = 'https://raw.githubusercontent.com/auraaicreations495-bit/Aura-ai/2c7f0d2eeb6a30ea3b346267db5c30ede5133b5e/Picsart_26-03-25_22-32-16-893.png';
        
        // ======== UTILITY FUNCTIONS ========
        const base32Decode = (input) => {
            const cleaned = input.toUpperCase().replace(/[^A-Z2-7]/g, '');
            const result = [];
            let bits = 0;
            let value = 0;
            
            for (let i = 0; i < cleaned.length; i++) {
                const char = cleaned.charAt(i);
                const val = base32Chars.indexOf(char);
                if (val === -1) continue;
                
                value = (value << 5) | val;
                bits += 5;
                
                if (bits >= 8) {
                    result.push((value >>> (bits - 8)) & 0xFF);
                    bits -= 8;
                }
            }
            return new Uint8Array(result);
        };
        
        const hmacSha1 = async (key, message) => {
            const cryptoKey = await crypto.subtle.importKey(
                'raw',
                key,
                { name: 'HMAC', hash: 'SHA-1' },
                false,
                ['sign']
            );
            const signature = await crypto.subtle.sign('HMAC', cryptoKey, message);
            return new Uint8Array(signature);
        };
        
        const generateTOTP = async (secret, timeStep = null) => {
            try {
                const step = timeStep || Math.floor(Date.now() / 30000);
                const timeBuffer = new ArrayBuffer(8);
                const timeView = new DataView(timeBuffer);
                timeView.setUint32(4, step, false);
                const keyBytes = base32Decode(secret);
                const hmac = await hmacSha1(keyBytes, timeBuffer);
                const offset = hmac[hmac.length - 1] & 0x0F;
                const binary = ((hmac[offset] & 0x7F) << 24) |
                               ((hmac[offset + 1] & 0xFF) << 16) |
                               ((hmac[offset + 2] & 0xFF) << 8) |
                               (hmac[offset + 3] & 0xFF);
                const otp = binary % 1000000;
                return otp.toString().padStart(6, '0');
            } catch (error) {
                console.error('TOTP generation error:', error);
                return generateFallbackTOTP(secret, timeStep);
            }
        };
        
        const generateFallbackTOTP = (secret, timeStep = null) => {
            const step = timeStep || Math.floor(Date.now() / 30000);
            let hash = 0;
            const combined = secret + step;
            for (let i = 0; i < combined.length; i++) {
                const char = combined.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            const code = Math.abs(hash % 1000000);
            return code.toString().padStart(6, '0');
        };

        const getDeviceFingerprint = () => {
            const nav = navigator;
            const screen = window.screen;
            const fingerprint = [
                nav.userAgent,
                nav.language,
                screen.width + 'x' + screen.height,
                screen.colorDepth,
                new Date().getTimezoneOffset(),
                !!window.sessionStorage,
                !!window.localStorage,
                nav.hardwareConcurrency || 'unknown',
                nav.platform
            ].join('|');
            
            let hash = 0;
            for (let i = 0; i < fingerprint.length; i++) {
                const char = fingerprint.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            return 'device_' + Math.abs(hash).toString(16);
        };
        
        const isValidEmail = (email) => {
            const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return re.test(email);
        };
        
        const isValidPhone = (phone) => {
            const re = /^(07\d{8}|\+94\d{9})$/;
            return re.test(phone.replace(/\s/g, ''));
        };
        
        // ======== PARTICLES & FIREWORKS ========
        const initParticles = () => {
            const canvas = document.getElementById('canvas-container');
            const ctx = canvas.getContext('2d');
            
            const resize = () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            };
            resize();
            window.addEventListener('resize', resize);
            
            const particles = [];
            const particleCount = 100;
            
            class Particle {
                constructor() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.size = Math.random() * 2 + 0.5;
                    this.speedX = Math.random() * 0.5 - 0.25;
                    this.speedY = Math.random() * 0.5 - 0.25;
                    this.opacity = Math.random() * 0.5 + 0.2;
                }
                
                update() {
                    this.x += this.speedX;
                    this.y += this.speedY;
                    
                    if (this.x > canvas.width) this.x = 0;
                    if (this.x < 0) this.x = canvas.width;
                    if (this.y > canvas.height) this.y = 0;
                    if (this.y < 0) this.y = canvas.height;
                }
                
                draw() {
                    ctx.fillStyle = `rgba(255, 78, 205, ${this.opacity})`;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
            
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
            
            const animate = () => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                particles.forEach((p1, i) => {
                    particles.slice(i + 1).forEach(p2 => {
                        const dx = p1.x - p2.x;
                        const dy = p1.y - p2.y;
                        const distance = Math.sqrt(dx * dx + dy * dy);
                        
                        if (distance < 150) {
                            ctx.strokeStyle = `rgba(255, 78, 205, ${0.1 * (1 - distance / 150)})`;
                            ctx.lineWidth = 1;
                            ctx.beginPath();
                            ctx.moveTo(p1.x, p1.y);
                            ctx.lineTo(p2.x, p2.y);
                            ctx.stroke();
                        }
                    });
                });
                
                particles.forEach(p => {
                    p.update();
                    p.draw();
                });
                
                requestAnimationFrame(animate);
            };
            animate();
        };

        const initFireworks = () => {
            const canvas = document.getElementById('fireworks-canvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            
            const resize = () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            };
            resize();
            window.addEventListener('resize', resize);
            
            const fireworks = [];
            const particles = [];
            
            class Firework {
                constructor(x, targetY, color) {
                    this.x = x;
                    this.y = canvas.height;
                    this.targetY = targetY;
                    this.speed = 8;
                    this.color = color;
                    this.exploded = false;
                }
                
                update() {
                    this.y -= this.speed;
                    if (this.y <= this.targetY && !this.exploded) {
                        this.explode();
                        this.exploded = true;
                    }
                }
                
                explode() {
                    for (let i = 0; i < 50; i++) {
                        particles.push(new Particle(this.x, this.y, this.color));
                    }
                }
                
                draw() {
                    if (!this.exploded) {
                        ctx.fillStyle = this.color;
                        ctx.beginPath();
                        ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            }
            
            class Particle {
                constructor(x, y, color) {
                    this.x = x;
                    this.y = y;
                    this.vx = (Math.random() - 0.5) * 8;
                    this.vy = (Math.random() - 0.5) * 8;
                    this.life = 1;
                    this.color = color;
                    this.size = Math.random() * 3 + 1;
                }
                
                update() {
                    this.x += this.vx;
                    this.y += this.vy;
                    this.vy += 0.1;
                    this.life -= 0.02;
                }
                
                draw() {
                    ctx.globalAlpha = this.life;
                    ctx.fillStyle = this.color;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.globalAlpha = 1;
                }
            }
            
            const colors = ['#ff4ecd', '#00d4ff', '#8b5cf6', '#ffd700', '#22c55e', '#ff6b6b'];
            
            const launchFirework = () => {
                const x = Math.random() * canvas.width;
                const targetY = Math.random() * (canvas.height * 0.5) + 100;
                const color = colors[Math.floor(Math.random() * colors.length)];
                fireworks.push(new Firework(x, targetY, color));
            };
            
            let frameCount = 0;
            const animate = () => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                if (frameCount % 30 === 0) {
                    launchFirework();
                }
                frameCount++;
                
                fireworks.forEach((fw, i) => {
                    fw.update();
                    fw.draw();
                    if (fw.exploded) fireworks.splice(i, 1);
                });
                
                particles.forEach((p, i) => {
                    p.update();
                    p.draw();
                    if (p.life <= 0) particles.splice(i, 1);
                });
                
                requestAnimationFrame(animate);
            };
            
            canvas.style.opacity = '0';
            canvas.style.transition = 'opacity 1s';
            animate();
            
            return {
                show: () => { canvas.style.opacity = '1'; },
                hide: () => { canvas.style.opacity = '0'; }
            };
        };

        // ======== DATABASE ========
        const DB_NAME = 'AuraAIDB';
        const DB_VERSION = 1;
        const STORE_NAME = 'users';
        
        const openDB = () => {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onerror = () => reject(request.error);
                request.onsuccess = () => resolve(request.result);
                request.onupgradeneeded = (event) => {
                    const db = event.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        db.createObjectStore(STORE_NAME, { keyPath: 'email' });
                    }
                };
            });
        };
        
        const saveUserToDB = async (userData) => {
            try {
                const db = await openDB();
                const transaction = db.transaction([STORE_NAME], 'readwrite');
                const store = transaction.objectStore(STORE_NAME);
                await store.put(userData);
                return true;
            } catch (error) {
                console.error('Error saving to IndexedDB:', error);
                return false;
            }
        };
        
        const getUserFromDB = async (email) => {
            try {
                const db = await openDB();
                const transaction = db.transaction([STORE_NAME], 'readonly');
                const store = transaction.objectStore(STORE_NAME);
                return new Promise((resolve, reject) => {
                    const request = store.get(email);
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            } catch (error) {
                console.error('Error reading from IndexedDB:', error);
                return null;
            }
        };

        // ======== COOKIES ========

        };
        
        const getCookie = (name) => {
            return document.cookie.split('; ').reduce((r, v) => {
                const parts = v.split('=');
                return parts[0] === name ? decodeURIComponent(parts[1]) : r;
            }, '');

                e.preventDefault();
                setError('');
                setShowDeviceWarning(false);
                setIsLoading(true);
                
                const localUsers = JSON.parse(localStorage.getItem('aura_users') || '[]');
                const dbUsers = await getAllUsersFromDB();
                const allUsers = [...localUsers, ...dbUsers];
                
                const user = allUsers.find(u => u.email === formData.email);
                
                if (!user) {
                    setError('Email not registered. Please register first.');
                    setIsLoading(false);
                    return;
                }
                
                if (user.password !== formData.password) {
                    setError('Invalid password');
                    setIsLoading(false);
                    return;
                }
                
                const deviceBindings = JSON.parse(localStorage.getItem('aura_device_bindings') || '{}');
                const currentDevice = getDeviceFingerprint();
                const savedDevice = deviceBindings[formData.email];
                
                if (savedDevice && savedDevice !== currentDevice) {
                    setError('This account is registered on another device. Please use your registered device or contact support.');
                    setShowDeviceWarning(true);
                    setIsLoading(false);
                    return;
                }
                
                deviceBindings[formData.email] = currentDevice;
                localStorage.setItem('aura_device_bindings', JSON.stringify(deviceBindings));
                
                const userIndex = localUsers.findIndex(u => u.email === formData.email);
                if (userIndex !== -1) {
                    localUsers[userIndex].deviceId = currentDevice;
                    localStorage.setItem('aura_users', JSON.stringify(localUsers));
                }
                
                await saveUserToDB({...user, deviceId: currentDevice});
                
                setCookie('aura_current_email', user.email);
                setCookie('aura_auth_token', btoa(user.email + ':' + user.password));

                onSuccess(user);

                const loadProfilePicture = async () => {
                    if (user?.profilePicture) {
                        setPreviewImage(user.profilePicture);
                        return;
                    }
                    
                    const users = JSON.parse(localStorage.getItem('aura_users') || '[]');
                    const localUser = users.find(u => u.email === user?.email);
                    if (localUser?.profilePicture) {
                        setPreviewImage(localUser.profilePicture);
                        updateUser({...user, profilePicture: localUser.profilePicture});
                        return;
                    }
                    
                    const dbUser = await getUserFromDB(user?.email);
                    if (dbUser?.profilePicture) {
                        setPreviewImage(dbUser.profilePicture);
                        updateUser({...user, profilePicture: dbUser.profilePicture});
                        if (localUser) {
                            localUser.profilePicture = dbUser.profilePicture;
                            localStorage.setItem('aura_users', JSON.stringify(users));
                        }
                    }
                };
                
                if (user?.email) {
                    loadProfilePicture();
                }
            }, [user?.email]);
            
            useEffect(() => {
                const handleVisibilityChange = () => {
                    if (document.hidden && previewImage) {
                        handleRemovePhoto();
                    }
                };
                
                document.addEventListener('visibilitychange', handleVisibilityChange);
                
                const handleBeforeUnload = () => {
                    if (previewImage) {
                        handleRemovePhoto();
                    }
                };
                
                window.addEventListener('beforeunload', handleBeforeUnload);
                
                return () => {
                    document.removeEventListener('visibilitychange', handleVisibilityChange);
                    window.removeEventListener('beforeunload', handleBeforeUnload);
                };
            }, [previewImage]);
            
            const handleImageChange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    setIsUploading(true);
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        const imageData = reader.result;
                        setPreviewImage(imageData);
                        setIsUploading(false);
                        
                        const updatedUser = { ...user, profilePicture: imageData };
                        
                        const users = JSON.parse(localStorage.getItem('aura_users') || '[]');
                        const userIndex = users.findIndex(u => u.email === user.email);
                        if (userIndex !== -1) {
                            users[userIndex] = updatedUser;
                            localStorage.setItem('aura_users', JSON.stringify(users));
                        }
                        
                        localStorage.setItem('aura_current_user', JSON.stringify(updatedUser));
                        saveUserToDB(updatedUser);
                        setCookie('aura_current_email', updatedUser.email);
                        setCookie('aura_auth_token', btoa(updatedUser.email + ':' + updatedUser.password));
                        updateUser(updatedUser);
                        showToast('Profile picture updated!', 'success');
                    };
                    reader.readAsDataURL(file);
                }
            };
            
            const handleRemovePhoto = () => {
                setPreviewImage(null);

                const users = JSON.parse(localStorage.getItem('aura_users') || '[]');
                const userIndex = users.findIndex(u => u.email === user.email);
                if (userIndex !== -1) {
                    users[userIndex] = updatedUser;
                    localStorage.setItem('aura_users', JSON.stringify(users));
                }
                
                localStorage.setItem('aura_current_user', JSON.stringify(updatedUser));
                saveUserToDB(updatedUser);
                setCookie('aura_current_email', updatedUser.email);
                setCookie('aura_auth_token', btoa(updatedUser.email + ':' + updatedUser.password));
                updateUser(updatedUser);

                const newItem = {
                    id: Date.now(),

                    description,
                    createdAt: new Date().toISOString()

            ]);
            const [input, setInput] = useState('');
            
            const handleSend = () => {
                if (!input.trim()) return;
                
                const userMessage = { type: 'user', text: input };
                setMessages([...messages, userMessage]);
                
                // Simple AI responses
                const responses = {
                    'hello': 'Hello! Ready to learn AI today?',
                    'help': 'I can help you with:\n- Lesson explanations\n- Quiz hints\n- Study tips\n- Technical questions',
                    'quiz': 'Make sure to watch the full video before attempting the quiz!',

                    'stuck': 'Try rewatching the video or check the lesson notes section.',
                    'default': 'That is a great question! I recommend reviewing the lesson materials or asking in the discussion forum.'
                };
                
                const lowerInput = input.toLowerCase();
                let response = responses.default;
                
                Object.keys(responses).forEach(key => {
                    if (lowerInput.includes(key)) {
                        response = responses[key];
                    }
                });
                
                setTimeout(() => {
                    setMessages(prev => [...prev, { type: 'bot', text: response }]);
                }, 1000);
                
                setInput('');

            const [bookmarks, setBookmarks] = useState(() => {
                return JSON.parse(localStorage.getItem('aura_bookmarks_' + lesson.id) || '[]');

            const [notes, setNotes] = useState(() => {

            });
            const [newNote, setNewNote] = useState('');
            const [showNotes, setShowNotes] = useState(false);

            useEffect(() => {
                const currentViews = parseInt(localStorage.getItem('aura_total_views') || '0');
                localStorage.setItem('aura_total_views', (currentViews + 1).toString());
            }, [lesson.id]);
            
            const handleTap = (e) => {
                const currentTime = new Date().getTime();
                const tapLength = currentTime - lastTap;
                
                if (tapLength < 300 && tapLength > 0) {
                    e.preventDefault();
                    toggleFullscreen();
                }
                
                setLastTap(currentTime);
            };
            
            const toggleFullscreen = () => {
                const container = containerRef.current;
                if (!container) return;
                
                if (!document.fullscreenElement) {
                    if (container.requestFullscreen) {
                        container.requestFullscreen();
                    } else if (container.webkitRequestFullscreen) {
                        container.webkitRequestFullscreen();
                    } else if (container.mozRequestFullScreen) {
                        container.mozRequestFullScreen();
                    }
                } else {
                    if (document.exitFullscreen) {
                        document.exitFullscreen();
                    } else if (document.webkitExitFullscreen) {
                        document.webkitExitFullscreen();
                    } else if (document.mozCancelFullScreen) {
                        document.mozCancelFullScreen();
                    }
                }
            };
            
            const handlePlay = () => {
                setIsPlaying(true);
            };

                const bookmark = {

                    timestamp: new Date().toLocaleTimeString(),
                    title: 'Bookmark ' + (bookmarks.length + 1)

                    timestamp: new Date().toLocaleTimeString()
                };

            }, []);

            const createConfetti = () => {
                const colors = ['#000000', '#333333', '#666666', '#999999', '#cc0000', '#ff0000'];
                for (let i = 0; i < 80; i++) {
                    const confetti = document.createElement('div');
                    confetti.className = 'certificate-confetti';
                    confetti.style.left = Math.random() * 100 + '%';
                    confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                    confetti.style.animationDelay = Math.random() * 3 + 's';
                    confetti.style.width = Math.random() * 12 + 6 + 'px';
                    confetti.style.height = Math.random() * 12 + 6 + 'px';
                    confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                    document.body.appendChild(confetti);
                    
                    setTimeout(() => confetti.remove(), 5000);

            const downloadPDF = async () => {
                setIsGenerating(true);
                try {
                    const element = certificateRef.current;
                    
                    // Use html2canvas to capture the certificate
                    const canvas = await html2canvas(element, {
                        scale: 2,
                        useCORS: true,
                        allowTaint: true,
                        backgroundColor: '#ffffff',
                        logging: false,
                        width: 794,  // A4 width in pixels at 96 DPI
                        height: 1123 // A4 height in pixels at 96 DPI
                    });
                    
                    // Convert to blob for gallery save
                    const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png', 1.0));
                    
                    // Create download link
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = `Aura_AI_Certificate_${user?.name?.replace(/\s+/g, '_') || 'Student'}.png`;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    
                    // Try to save to gallery on mobile
                    if (navigator.share && navigator.canShare) {
                        const file = new File([blob], `Aura_AI_Certificate_${user?.name?.replace(/\s+/g, '_') || 'Student'}.png`, { type: 'image/png' });

                            });

                    const imgData = canvas.toDataURL('image/png', 1.0);
                    
                    const pdfWidth = 210; // A4 width in mm
                    const pdfHeight = 297; // A4 height in mm
                    
                    pdf.addImage(imgData, 'PNG', 0, 0, pdfWidth, pdfHeight);
