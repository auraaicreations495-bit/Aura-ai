<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura AI Creations - AI Video Course Platform</title>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Noto+Sans+Sinhala:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Outfit', 'Noto Sans Sinhala', 'sans-serif'] },
                    colors: {
                        aura: { primary: '#6366f1', secondary: '#8b5cf6', accent: '#ec4899', dark: '#0f172a', darker: '#020617' }
                    },
                    animation: { 'glow': 'glow 2s ease-in-out infinite alternate' },
                    keyframes: { glow: { '0%': { boxShadow: '0 0 5px #6366f1' }, '100%': { boxShadow: '0 0 20px #8b5cf6' } } }
                }
            }
        }
    </script>
    
    <style>
        body { background: #020617; overflow-x: hidden; color: white; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .glass-strong { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(99, 102, 241, 0.2); }
        .gradient-text { background: linear-gradient(135deg, #6366f1, #ec4899, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .video-progress { background: linear-gradient(90deg, #6366f1, #ec4899); }
        #canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
    </style>
</head>
<body>
    <div id="root"></div>
    <canvas id="canvas-container"></canvas>

    <script type="text/babel">
        const { useState, useEffect, createContext, useContext } = React;
        const { motion, AnimatePresence } = window.Motion;
        const AuthContext = createContext(null);

        // --- Background Particles ---
        const initParticles = () => {
            const canvas = document.getElementById('canvas-container');
            if(!canvas) return;
            const ctx = canvas.getContext('2d');
            let particles = [];
            const resize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
            window.addEventListener('resize', resize); resize();
            for(let i=0; i<80; i++) particles.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*2, vx: Math.random()-0.5, vy: Math.random()-0.5 });
            const anim = () => {
                ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle = "rgba(99, 102, 241, 0.2)";
                particles.forEach(p => {
                    p.x += p.vx; p.y += p.vy;
                    if(p.x<0 || p.x>canvas.width) p.vx*=-1; if(p.y<0 || p.y>canvas.height) p.vy*=-1;
                    ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, Math.PI*2); ctx.fill();
                });
                requestAnimationFrame(anim);
            };
            anim();
        };

        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} width={size} height={size} className={className}></i>;
        };

        // --- Dashboard Components ---
        const Dashboard = ({ user, onLogout }) => {
            const [activeModule, setActiveModule] = useState(0);
            const [activeLesson, setActiveLesson] = useState(null);
            const [completedLessons, setCompletedLessons] = useState([]);
            const [watching, setWatching] = useState(false);
            const [moduleError, setModuleError] = useState('');

            const modules = [
                { 
                    title: 'AI Foundations - Basic Lessons', 
                    lessons: [
                        { id: 1, title: 'AI හැදින්විම (Introduction to AI)', duration: '15:00', videoUrl: 'https://drive.google.com/file/d/1GZ-h7SIAG5bOIavwLng1Sh1N2BdUmIW6/preview', thumbnail: 'https://drive.google.com/thumbnail?id=1GZ-h7SIAG5bOIavwLng1Sh1N2BdUmIW6&sz=w1000' },
                        { id: 2, title: 'Lesson 1 - AI Basics', duration: '12:30', videoUrl: 'https://drive.google.com/file/d/10-4GWQ_FAcUNrdnC3zqtOnGXSmsX2Y2R/preview', thumbnail: 'https://drive.google.com/thumbnail?id=10-4GWQ_FAcUNrdnC3zqtOnGXSmsX2Y2R&sz=w1000' },
                        { id: 3, title: 'Lesson 2 - Getting Started', duration: '18:45', videoUrl: 'https://drive.google.com/file/d/1uHMAdhZJSqwYar8XYV_NrUQcbA0i6g6-/preview', thumbnail: 'https://drive.google.com/thumbnail?id=1uHMAdhZJSqwYar8XYV_NrUQcbA0i6g6-&sz=w1000' },
                        { id: 4, title: 'Lesson 3 - Core Concepts', duration: '20:00', videoUrl: 'https://drive.google.com/file/d/1nQdUC8NrFpd-GiTgvSmYpsdVDK6r3lJy/preview', thumbnail: 'https://drive.google.com/thumbnail?id=1nQdUC8NrFpd-GiTgvSmYpsdVDK6r3lJy&sz=w1000' },
                        { id: 5, title: 'Lesson 4 - Practical Applications', duration: '22:15', videoUrl: 'https://drive.google.com/file/d/10hgirQhLVu5IoalRBLnIW7CMyl9vQiy_/preview', thumbnail: 'https://drive.google.com/thumbnail?id=10hgirQhLVu5IoalRBLnIW7CMyl9vQiy_&sz=w1000' },
                        { id: 6, title: 'Lesson 5 - Advanced Techniques', duration: '25:00', videoUrl: 'https://drive.google.com/file/d/1HXyLn9wDiGiLCelEXr0jipPIcQ5EjfMC/preview', thumbnail: 'https://drive.google.com/thumbnail?id=1HXyLn9wDiGiLCelEXr0jipPIcQ5EjfMC&sz=w1000' },
                        { id: 7, title: 'Lesson 6 - Final Project Setup', duration: '16:30', videoUrl: 'https://drive.google.com/file/d/1kswDC7oT5YV9SfqdBlmARDJj6_eiyJzD/preview', thumbnail: 'https://drive.google.com/thumbnail?id=1kswDC7oT5YV9SfqdBlmARDJj6_eiyJzD&sz=w1000' }
                    ]
                },
                {
                    title: 'Founder Mastery Course',
                    requiresCompletion: 7, 
                    lessons: [
                        { id: 8, title: 'Founder Mastery - Lesson 1', duration: '20:00', videoUrl: 'https://drive.google.com/file/d/1LmDbGoHxZOlRLnShNKXxyjy0aI0g4UA8/preview', thumbnail: 'https://drive.google.com/thumbnail?id=1LmDbGoHxZOlRLnShNKXxyjy0aI0g4UA8&sz=w1000' },
                        { id: 9, title: 'Founder Mastery - Lesson 2', duration: '20:00', videoUrl: 'https://drive.google.com/file/d/1SBag6taDaltJOhJXfTrAAuqsk5Dq60zu/preview', thumbnail: 'https://drive.google.com/thumbnail?id=1SBag6taDaltJOhJXfTrAAuqsk5Dq60zu&sz=w1000' }
                    ]
                }
            ];

            const handleVideoComplete = () => {
                let currentCompleted = [...completedLessons];
                if (activeLesson && !currentCompleted.includes(activeLesson.id)) {
                    currentCompleted.push(activeLesson.id);
                    setCompletedLessons(currentCompleted);
                }
                setWatching(false);

                // මීළඟ පාඩම හෝ මොඩියුලය සෙවීම
                const currentModuleObj = modules[activeModule];
                const currentLessonIdx = currentModuleObj.lessons.findIndex(l => l.id === activeLesson.id);

                if (currentLessonIdx < currentModuleObj.lessons.length - 1) {
                    // ඊළඟ පාඩම පෙන්වන්න
                    setActiveLesson(currentModuleObj.lessons[currentLessonIdx + 1]);
                } else if (activeModule < modules.length - 1) {
                    // ඊළඟ මොඩියුලයට යන්න
                    const nextModuleIdx = activeModule + 1;
                    const nextModule = modules[nextModuleIdx];
                    
                    if (currentCompleted.includes(nextModule.requiresCompletion)) {
                        setActiveModule(nextModuleIdx);
                        setActiveLesson(nextModule.lessons[0]);
                    } else {
                        // මීළඟ එක ලොක් නම් මුකුත් කරන්න එපා, පවතින වීඩියෝවම තියෙන්න දෙන්න
                    }
                }
            };

            const totalLessons = modules.reduce((acc, m) => acc + m.lessons.length, 0);
            const overallProgress = Math.round((completedLessons.length / totalLessons) * 100);

            return (
                <div className="min-h-screen pt-24 pb-12 px-4 max-w-7xl mx-auto">
                    <div className="grid lg:grid-cols-3 gap-8">
                        {/* Sidebar */}
                        <div className="space-y-6">
                            <div className="glass-strong rounded-2xl p-6">
                                <div className="flex items-center gap-4 mb-6">
                                    <div className="w-12 h-12 rounded-full bg-indigo-500 flex items-center justify-center font-bold text-lg">{user?.name[0]}</div>
                                    <div className="flex-1">
                                        <h3 className="font-semibold truncate">{user?.name}</h3>
                                        <p className="text-gray-400 text-xs">{user?.email}</p>
                                    </div>
                                </div>
                                <div className="space-y-4">
                                    <div>
                                        <div className="flex justify-between text-xs mb-1"><span>Course Progress</span><span>{overallProgress}%</span></div>
                                        <div className="h-1.5 bg-gray-800 rounded-full overflow-hidden"><div className="h-full video-progress" style={{width: `${overallProgress}%`}}></div></div>
                                    </div>
                                    <button onClick={onLogout} className="w-full py-2 border border-red-500/30 text-red-400 rounded-xl text-xs flex items-center justify-center gap-2 hover:bg-red-500/10 transition-all"><Icon name="log-out" size={14}/> Logout</button>
                                </div>
                            </div>

                            <div className="glass rounded-2xl p-4 max-h-[500px] overflow-y-auto">
                                <h4 className="font-semibold mb-4 text-sm">Course Modules</h4>
                                {moduleError && <div className="p-2 mb-3 bg-red-500/20 text-red-400 text-[10px] rounded-lg border border-red-500/40 flex items-center gap-2"><Icon name="alert-circle" size={12}/> {moduleError}</div>}
                                <div className="space-y-3">
                                    {modules.map((mod, idx) => (
                                        <div key={idx}>
                                            <button 
                                                onClick={() => {
                                                    if(mod.requiresCompletion && !completedLessons.includes(mod.requiresCompletion)) {
                                                        setModuleError(`කරුණාකර Basic Lessons ඔක්කොම බලන්න.`);
                                                        setTimeout(() => setModuleError(''), 3000);
                                                        return;
                                                    }
                                                    setActiveModule(idx);
                                                }}
                                                className={`w-full text-left p-3 rounded-xl transition-all flex justify-between items-center ${activeModule === idx ? 'bg-indigo-600/20 border border-indigo-500/30' : 'hover:bg-white/5'}`}
                                            >
                                                <span className="text-xs font-medium">{mod.title}</span>
                                                {mod.requiresCompletion && !completedLessons.includes(mod.requiresCompletion) && <Icon name="lock" size={14} className="text-yellow-500"/>}
                                            </button>
                                            {activeModule === idx && (
                                                <div className="mt-2 ml-2 space-y-1">
                                                    {mod.lessons.map(lesson => (
                                                        <button 
                                                            key={lesson.id} 
                                                            onClick={() => { setActiveLesson(lesson); setWatching(false); }}
                                                            className={`w-full text-left p-2 rounded-lg text-[11px] flex items-center gap-2 ${activeLesson?.id === lesson.id ? 'text-indigo-400 bg-indigo-500/10' : completedLessons.includes(lesson.id) ? 'text-green-400' : 'text-gray-400'}`}
                                                        >
                                                            <Icon name={completedLessons.includes(lesson.id) ? "check-circle" : "play-circle"} size={12}/>
                                                            <span className="flex-1 truncate">{lesson.title}</span>
                                                        </button>
                                                    ))}
                                                </div>
                                            )}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>

                        {/* Main Content (Video Area) */}
                        <div className="lg:col-span-2">
                            <div className="glass-strong rounded-3xl overflow-hidden min-h-[400px] flex flex-col">
                                {activeLesson ? (
                                    <>
                                        <div className="aspect-video bg-black relative">
                                            {!watching ? (
                                                <div className="w-full h-full relative cursor-pointer group" onClick={() => setWatching(true)}>
                                                    <img src={activeLesson.thumbnail} className="w-full h-full object-cover opacity-60 group-hover:opacity-40 transition-all"/>
                                                    <div className="absolute inset-0 flex items-center justify-center">
                                                        <div className="w-16 h-16 rounded-full bg-white/20 backdrop-blur-md flex items-center justify-center group-hover:scale-110 transition-all"><Icon name="play" size={32} className="ml-1"/></div>
                                                    </div>
                                                </div>
                                            ) : (
                                                <iframe src={`${activeLesson.videoUrl}?autoplay=1`} className="w-full h-full" allow="autoplay" allowFullScreen></iframe>
                                            )}
                                        </div>
                                        <div className="p-6 flex-1">
                                            <h2 className="text-xl font-bold mb-2">{activeLesson.title}</h2>
                                            <p className="text-gray-400 text-sm mb-6">වීඩියෝව සම්පූර්ණයෙන් නරඹා අවසානයේ 'Mark as Complete' බොත්තම ඔබන්න.</p>
                                            <div className="flex gap-3">
                                                {!completedLessons.includes(activeLesson.id) ? (
                                                    <button onClick={handleVideoComplete} className="px-6 py-2.5 bg-gradient-to-r from-indigo-600 to-purple-600 rounded-xl text-sm font-semibold flex items-center gap-2 hover:shadow-lg transition-all"><Icon name="check" size={18}/> Mark as Complete</button>
                                                ) : (
                                                    <div className="px-6 py-2.5 bg-green-500/20 text-green-400 border border-green-500/30 rounded-xl text-sm font-semibold flex items-center gap-2"><Icon name="check-circle" size={18}/> Completed</div>
                                                )}
                                            </div>
                                            {/* සියල්ල ඉවර උනාම එන පණිවිඩය වීඩියෝවට යටින් පෙන්වීමට සකසා ඇත */}
                                            {overallProgress === 100 && (
                                                <motion.div initial={{opacity:0, y:10}} animate={{opacity:1, y:0}} className="mt-8 p-4 bg-green-500/10 border border-green-500/20 rounded-2xl flex items-center gap-4">
                                                    <Icon name="award" className="text-green-500" size={32} />
                                                    <div>
                                                        <h4 className="font-bold text-green-400">සියල්ල සාර්ථකයි!</h4>
                                                        <p className="text-gray-400 text-xs">ඔබ සියලුම පාඩම් නරඹා අවසන් කර ඇත.</p>
                                                    </div>
                                                </motion.div>
                                            )}
                                        </div>
                                    </>
                                ) : (
                                    <div className="flex-1 flex flex-col items-center justify-center p-10 text-center">
                                        <div>
                                            <div className="w-16 h-16 bg-indigo-500/10 text-indigo-400 rounded-full flex items-center justify-center mx-auto mb-4 border border-indigo-500/20"><Icon name="play" size={32}/></div>
                                            <h3 className="text-lg font-bold mb-2">පාඩමක් තෝරාගන්න</h3>
                                            <p className="text-gray-500 text-sm">ඉගෙනීම ආරම්භ කිරීමට වම්පස මෙනුවෙන් පාඩමක් තෝරන්න.</p>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- Main App ---
        const App = () => {
            const [currentPage, setCurrentPage] = useState('home');
            const [user, setUser] = useState(null);

            useEffect(() => {
                initParticles();
                const saved = localStorage.getItem('aura_user');
                if(saved) { setUser(JSON.parse(saved)); setCurrentPage('dashboard'); }
                const nav = (e) => setCurrentPage(e.detail);
                window.addEventListener('navigate', nav);
                return () => window.removeEventListener('navigate', nav);
            }, []);

            const login = (u) => { setUser(u); localStorage.setItem('aura_user', JSON.stringify(u)); setCurrentPage('dashboard'); };
            const logout = () => { setUser(null); localStorage.removeItem('aura_user'); setCurrentPage('home'); };

            return (
                <div className="font-sans">
                    {/* Simplified Navbar */}
                    <nav className="fixed top-0 w-full z-50 glass py-4 px-6 flex justify-between items-center">
                        <div className="flex items-center gap-2 cursor-pointer" onClick={() => setCurrentPage('home')}>
                            <div className="w-8 h-8 rounded-lg bg-indigo-600 flex items-center justify-center font-bold">A</div>
                            <span className="font-bold text-lg">Aura <span className="gradient-text">AI</span></span>
                        </div>
                        {user ? (
                            <button onClick={() => setCurrentPage('dashboard')} className="text-sm font-medium hover:text-indigo-400 transition-colors">My Learning</button>
                        ) : (
                            <button onClick={() => setCurrentPage('auth')} className="px-5 py-2 bg-indigo-600 rounded-full text-xs font-bold">Login</button>
                        )}
                    </nav>

                    <AnimatePresence mode="wait">
                        <motion.main key={currentPage} initial={{opacity:0}} animate={{opacity:1}} exit={{opacity:0}}>
                            {currentPage === 'home' && (
                                <div className="h-screen flex flex-col items-center justify-center text-center px-6">
                                    <h1 className="text-5xl font-bold mb-4">Unlock Your <span className="gradient-text">AI Potential</span></h1>
                                    <p className="text-gray-400 max-w-lg mb-8">Professional AI video courses in Sinhala. Learn, create, and master the future.</p>
                                    <button onClick={() => setCurrentPage('auth')} className="px-10 py-4 bg-indigo-600 rounded-full font-bold hover:scale-105 transition-all">Get Started</button>
                                </div>
                            )}
                            {currentPage === 'auth' && (
                                <div className="h-screen flex items-center justify-center">
                                    <div className="glass-strong p-8 rounded-3xl w-full max-w-sm">
                                        <h2 className="text-2xl font-bold mb-6 text-center">Login to Aura AI</h2>
                                        <input id="email" type="email" placeholder="Email" className="w-full p-3 rounded-xl bg-white/5 border border-white/10 mb-4 focus:border-indigo-500 outline-none" />
                                        <button onClick={() => login({name: "Student", email: document.getElementById('email').value})} className="w-full py-3 bg-indigo-600 rounded-xl font-bold">Sign In</button>
                                    </div>
                                </div>
                            )}
                            {currentPage === 'dashboard' && <Dashboard user={user} onLogout={logout} />}
                        </motion.main>
                    </AnimatePresence>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
