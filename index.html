                                            {/* Forum Section */}
                                            <AnimatePresence>
                                                {showForum && (
                                                    <motion.div
                                                        initial={{ opacity: 0, height: 0 }}
                                                        animate={{ opacity: 1, height: 'auto' }}
                                                        exit={{ opacity: 0, height: 0 }}
                                                        className="px-6 pb-6"
                                                    >
                                                        <DiscussionForum lessonId={activeLesson.id} />
                                                    </motion.div>
                                                )}
                                            </AnimatePresence>
                                        </>
                                    ) : (
                                        <div className="aspect-video flex items-center justify-center">
                                            <div className="text-center">
                                                <motion.div 
                                                    className="w-20 h-20 rounded-full bg-pink-500/20 flex items-center justify-center mx-auto mb-4"
                                                    animate={{ scale: [1, 1.1, 1] }}
                                                    transition={{ repeat: Infinity, duration: 3 }}
                                                >
                                                    <Icon name="book-open" size={32} className="text-pink-400" />
                                                </motion.div>
                                                <h3 className="text-white font-semibold mb-2">Select a Lesson</h3>
                                                <p className="text-gray-400 text-sm">Choose a lesson from the sidebar to start learning</p>
                                                
                                                {founderUnlocked && (
                                                    <motion.button
                                                        initial={{ opacity: 0, y: 20 }}
                                                        animate={{ opacity: 1, y: 0 }}
                                                        onClick={() => setActiveModule(1)}
                                                        className="btn-animated btn-green mt-6 px-6 py-3 text-white rounded-xl font-medium"
                                                        whileHover={{ scale: 1.05 }}
                                                        whileTap={{ scale: 0.95 }}
                                                    >
                                                        🚀 Start Founder Mastery Course
                                                    </motion.button>
                                                )}
                                            </div>
                                        </div>
                                    )}
                                </motion.div>
                                
                                {activeLesson && (
                                    <motion.div
                                        initial={{ opacity: 0, y: 20 }}
                                        animate={{ opacity: 1, y: 0 }}
                                        transition={{ delay: 0.1 }}
                                        className="glass rounded-2xl p-6"
                                    >
                                        <h3 className="text-white font-semibold mb-4">Lesson Notes</h3>
                                        <div className="space-y-3 text-sm text-gray-400">
                                            <p>• This lesson covers key concepts in {modules[activeModule].title}</p>
                                            <p>• Watch the complete video to unlock the next lesson</p>
                                            <p>• Use bookmarks to save important moments</p>
                                            <p>• Take notes while watching for better retention</p>
                                            <p>• Complete the quiz after watching</p>
                                            <p>• Join the discussion forum for questions</p>
                                        </div>
                                    </motion.div>
                                )}
                            </div>
                        </div>
                    </div>

                    {/* AI Chatbot */}
                    <AIChatbot />

                    {/* Celebration Modal */}
                    <AnimatePresence>
                        {showCelebration && (
                            <CompletionCelebration 
                                user={user}
                                stats={{ totalLessons: 13, totalHours: 2.5, skills: 6 }}
                                onComplete={() => {
                                    setShowCelebration(false);
                                    setShowCertificate(true);
                                }}
                            />
                        )}
                    </AnimatePresence>

                    {/* Certificate Modal */}
                    <AnimatePresence>
                        {showCertificate && (
                            <CertificateGenerator 
                                user={user} 
                                onClose={() => setShowCertificate(false)} 
                            />
                        )}
                    </AnimatePresence>
                </div>
            );
        };
        
        // ======== APP ========
        const App = () => {
            const [currentPage, setCurrentPage] = useState('home');
            const [user, setUser] = useState(null);
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [showIntro, setShowIntro] = useState(true);
            const [introCompleted, setIntroCompleted] = useState(false);
            const [isLoading, setIsLoading] = useState(true);
            const fireworksRef = useRef(null);
            
            useEffect(() => {
                initParticles();
                preventScreenRecording();
                
                fireworksRef.current = initFireworks();
                
                const introShown = sessionStorage.getItem('aura_intro_shown');
                if (introShown) {
                    setShowIntro(false);
                    setIntroCompleted(true);
                }
                
                const checkLoginStatus = async () => {
                    try {
                        const savedUser = localStorage.getItem('aura_current_user');
                        const cookieEmail = getCookie('aura_current_email');
                        const cookieToken = getCookie('aura_auth_token');
                        const dbUsers = await getAllUsersFromDB();
                        
                        let userData = null;
                        
                        if (savedUser) {
                            try {
                                userData = JSON.parse(savedUser);
                            } catch (e) {
                                console.error('Error parsing localStorage user:', e);
                            }
                        }
                        
                        if (!userData && cookieEmail && cookieToken) {
                            const dbUser = dbUsers.find(u => u.email === cookieEmail);
                            if (dbUser) {
                                const expectedToken = btoa(dbUser.email + ':' + dbUser.password);
                                if (cookieToken === expectedToken) {
                                    userData = dbUser;
                                    localStorage.setItem('aura_current_user', JSON.stringify(dbUser));
                                }
                            }
                        }
                        
                        if (!userData && dbUsers.length > 0) {
                            const currentDevice = getDeviceFingerprint();
                            const deviceBindings = JSON.parse(localStorage.getItem('aura_device_bindings') || '{}');
                            
                            for (const dbUser of dbUsers) {
                                if (deviceBindings[dbUser.email] === currentDevice) {
                                    userData = dbUser;
                                    localStorage.setItem('aura_current_user', JSON.stringify(dbUser));
                                    setCookie('aura_current_email', dbUser.email);
                                    setCookie('aura_auth_token', btoa(dbUser.email + ':' + dbUser.password));
                                    break;
                                }
                            }
                        }
                        
                        if (userData) {
                            const deviceBindings = JSON.parse(localStorage.getItem('aura_device_bindings') || '{}');
                            const currentDevice = getDeviceFingerprint();
                            
                            if (!deviceBindings[userData.email]) {
                                deviceBindings[userData.email] = currentDevice;
                                localStorage.setItem('aura_device_bindings', JSON.stringify(deviceBindings));
                            }
                            
                            if (deviceBindings[userData.email] === currentDevice) {
                                setUser(userData);
                                setIsLoggedIn(true);
                                setCurrentPage('dashboard');
                                
                                localStorage.setItem('aura_current_user', JSON.stringify(userData));
                                await saveUserToDB(userData);
                                setCookie('aura_current_email', userData.email);
                                setCookie('aura_auth_token', btoa(userData.email + ':' + userData.password));
                            } else {
                                localStorage.removeItem('aura_current_user');
                                removeCookie('aura_current_email');
                                removeCookie('aura_auth_token');
                            }
                        }
                    } catch (error) {
                        console.error('Error checking login status:', error);
                    } finally {
                        setIsLoading(false);
                    }
                };
                
                checkLoginStatus();
                
                const handleNav = (e) => {
                    const page = e.detail;
                    if (page === 'home' && isLoggedIn) {
                        setCurrentPage('dashboard');
                    } else {
                        setCurrentPage(page);
                    }
                };
                
                window.addEventListener('navigate', handleNav);
                return () => window.removeEventListener('navigate', handleNav);
            }, [isLoggedIn]);

            const handleIntroComplete = () => {
                setIntroCompleted(true);
                setTimeout(() => setShowIntro(false), 800);
                sessionStorage.setItem('aura_intro_shown', 'true');
            };
            
            const handleLogin = async (userData) => {
                setUser(userData);
                setIsLoggedIn(true);
                
                localStorage.setItem('aura_current_user', JSON.stringify(userData));
                await saveUserToDB(userData);
                setCookie('aura_current_email', userData.email);
                setCookie('aura_auth_token', btoa(userData.email + ':' + userData.password));
                
                setCurrentPage('dashboard');
            };
            
            const handleLogout = async () => {
                localStorage.removeItem('aura_current_user');
                removeCookie('aura_current_email');
                removeCookie('aura_auth_token');
                
                if (user?.email) {
                    await removeUserFromDB(user.email);
                }
                
                setUser(null);
                setIsLoggedIn(false);
                setCurrentPage('home');
            };
            
            const updateUser = (updatedUser) => {
                setUser(updatedUser);
            };
            
            const renderPage = () => {
                switch(currentPage) {
                    case 'home':
                        return (
                            <>
                                <Hero />
                                <div className="max-w-7xl mx-auto px-6">
                                    <LiveStats />
                                </div>
                                <AITips />
                            </>
                        );
                    case 'auth':
                        return <AuthPage onLogin={handleLogin} />;
                    case 'dashboard':
                        return isLoggedIn ? <Dashboard onLogout={handleLogout} /> : <AuthPage onLogin={handleLogin} />;
                    case 'profile':
                        return isLoggedIn ? <Profile onLogout={handleLogout} /> : <AuthPage onLogin={handleLogin} />;
                    case 'courses':
                        return isLoggedIn ? <Dashboard onLogout={handleLogout} /> : <AuthPage onLogin={handleLogin} />;
                    case 'about':
                        return (
                            <div className="min-h-screen flex items-center justify-center pt-20 px-6">
                                <div className="max-w-3xl mx-auto text-center">
                                    <motion.h1 
                                        initial={{ opacity: 0, y: 20 }}
                                        animate={{ opacity: 1, y: 0 }}
                                        className="text-4xl font-bold text-white mb-6"
                                    >
                                        About <span className="gradient-text">Aura AI</span>
                                    </motion.h1>
                                    <motion.p 
                                        initial={{ opacity: 0, y: 20 }}
                                        animate={{ opacity: 1, y: 0 }}
                                        transition={{ delay: 0.1 }}
                                        className="text-gray-400 text-lg leading-relaxed mb-8"
                                    >
                                        Aura AI Creations is Sri Lanka's premier AI education platform. We provide comprehensive video courses in Sinhala medium, covering everything from basic AI concepts to advanced business applications.
                                    </motion.p>
                                    <div className="grid md:grid-cols-3 gap-6 mt-12">
                                        <motion.div 
                                            initial={{ opacity: 0, y: 20 }}
                                            animate={{ opacity: 1, y: 0 }}
                                            transition={{ delay: 0.2 }}
                                            className="glass p-6 rounded-2xl hover:border-pink-500/50 transition-all"
                                            whileHover={{ scale: 1.05, y: -5 }}
                                        >
                                            <div className="text-3xl font-bold text-white mb-2">13</div>
                                            <div className="text-gray-400">Video Lessons</div>
                                        </motion.div>
                                        <motion.div 
                                            initial={{ opacity: 0, y: 20 }}
                                            animate={{ opacity: 1, y: 0 }}
                                            transition={{ delay: 0.3 }}
                                            className="glass p-6 rounded-2xl hover:border-purple-500/50 transition-all"
                                            whileHover={{ scale: 1.05, y: -5 }}
                                        >
                                            <div className="text-3xl font-bold text-white mb-2">100%</div>
                                            <div className="text-gray-400">Sinhala Medium</div>
                                        </motion.div>
                                        <motion.div 
                                            initial={{ opacity: 0, y: 20 }}
                                            animate={{ opacity: 1, y: 0 }}
                                            transition={{ delay: 0.4 }}
                                            className="glass p-6 rounded-2xl hover:border-cyan-500/50 transition-all"
                                            whileHover={{ scale: 1.05, y: -5 }}
                                        >
                                            <div className="text-3xl font-bold text-white mb-2">24/7</div>
                                            <div className="text-gray-400">AI Support</div>
                                        </motion.div>
                                    </div>
                                </div>
                            </div>
                        );
                    default:
                        return <Hero />;
                }
            };
            
            if (isLoading) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-aura-darker">
                        <motion.div
                            animate={{ rotate: 360 }}
                            transition={{ repeat: Infinity, duration: 1 }}
                            className="w-12 h-12 border-4 border-pink-500 border-t-transparent rounded-full"
                        />
                    </div>
                );
            }
            
            return (
                <AuthContext.Provider value={{ user, isLoggedIn, logout: handleLogout, updateUser }}>
                    <AnimatePresence>
                        {showIntro && (
                            <AIIntroAnimation onComplete={handleIntroComplete} />
                        )}
                    </AnimatePresence>
                    
                    <motion.div 
                        className="min-h-screen text-gray-100 font-sans anti-screenshot no-screen-record"
                        initial={{ opacity: 0 }}
                        animate={{ opacity: introCompleted ? 1 : 0 }}
                        transition={{ duration: 0.5 }}
                    >
                        <Navigation />
                        <AnimatePresence mode="wait">
                            <motion.main
                                key={currentPage}
                                initial={{ opacity: 0, y: 20 }}
                                animate={{ opacity: 1, y: 0 }}
                                exit={{ opacity: 0, y: -20 }}
                                transition={{ duration: 0.3 }}
                                className="relative z-10"
                            >
                                {renderPage()}
                            </motion.main>
                        </AnimatePresence>
                        
                        <motion.footer 
                            initial={{ opacity: 0 }}
                            animate={{ opacity: 1 }}
                            transition={{ delay: 0.5 }}
                            className="border-t border-gray-800 py-12 mt-20 relative z-10"
                        >
                            <div className="max-w-7xl mx-auto px-6">
                                <div className="grid md:grid-cols-4 gap-8 mb-8">
                                    <div>
                                        <div className="flex items-center gap-2 mb-4">
                                            <div className="w-8 h-8 rounded-lg bg-gradient-to-br from-pink-500 to-purple-500 flex items-center justify-center overflow-hidden">
                                                <img 
                                                    src={LOGO_URL} 
                                                    alt="Aura AI Logo" 
                                                    className="nav-logo-img"
                                                    onError={(e) => {
                                                        e.target.style.display = 'none';
                                                        e.target.parentElement.innerHTML = '<span class="text-white font-bold text-sm">A</span>';
                                                    }}
                                                />
                                            </div>
                                            <span className="text-lg font-bold text-white">Aura AI</span>
                                        </div>
                                        <p className="text-gray-400 text-sm">Professional AI education platform for Sri Lankan students.</p>
                                    </div>
                                    <div>
                                        <h4 className="text-white font-semibold mb-4">Contact</h4>
                                        <ul className="space-y-2 text-sm text-gray-400">
                                            <li>WhatsApp: 078 299 8357</li>
                                            <li>Colombo, Sri Lanka</li>
                                        </ul>
                                    </div>
                                    <div>
                                        <h4 className="text-white font-semibold mb-4">Social</h4>
                                        <div className="flex gap-3">
                                            <motion.a 
                                                href="https://www.facebook.com/Auraaiareations" 
                                                target="_blank" 
                                                whileHover={{ scale: 1.1, y: -2 }}
                                                className="w-10 h-10 rounded-full glass flex items-center justify-center hover:bg-blue-600 transition-all"
                                            >
                                                <svg className="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 24 24">
                                                    <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                                                </svg>
                                            </motion.a>
                                            <motion.a 
                                                href="https://www.tiktok.com/@aura_ai_creations?_r=1&_t=ZS-95mKqsRBdvI" 
                                                target="_blank" 
                                                whileHover={{ scale: 1.1, y: -2 }}
                                                className="w-10 h-10 rounded-full glass flex items-center justify-center hover:bg-black transition-all"
                                            >
                                                <svg className="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 24 24">
                                                    <path d="M12.525.02c1.31-.02 2.61-.01 3.91-.02.08 1.53.63 3.09 1.75 4.17 1.12 1.11 2.7 1.62 4.24 1.79v4.03c-1.44-.05-2.89-.35-4.2-.97-.57-.26-1.1-.59-1.62-.93-.01 2.92.01 5.84-.02 8.75-.08 1.4-.54 2.79-1.35 3.94-1.31 1.92-3.58 3.17-5.91 3.21-1.43.08-2.86-.31-4.08-1.03-2.02-1.19-3.44-3.37-3.65-5.71-.02-.5-.03-1-.01-1.49.18-1.9 1.12-3.72 2.58-4.96 1.66-1.44 3.98-2.13 6.15-1.72.02 1.48-.04 2.96-.04 4.44-.99-.32-2.15-.23-3.02.37-.63.41-1.11 1.04-1.36 1.75-.21.51-.15 1.07-.14 1.61.24 1.64 1.82 3.02 3.5 2.87 1.12-.01 2.19-.66 2.77-1.61.19-.33.4-.67.41-1.06.1-1.79.06-3.57.07-5.36.01-4.03-.01-8.05.02-12.07z"/>
                                                </svg>
                                            </motion.a>
                                            <motion.a 
                                                href="https://wa.me/94782998357" 
                                                target="_blank" 
                                                whileHover={{ scale: 1.1, y: -2 }}
                                                className="w-10 h-10 rounded-full glass flex items-center justify-center hover:bg-green-600 transition-all"
                                            >
                                                <svg className="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 24 24">
                                                    <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/>
                                                </svg>
                                            </motion.a>
                                        </div>
                                    </div>
                                </div>
                                <div className="border-t border-gray-800 pt-8 text-center text-gray-500 text-sm">
                                    © 2026 Aura AI Creations. All rights reserved.
                                </div>
                            </div>
                        </motion.footer>
                    </motion.div>
                </AuthContext.Provider>
            );
        };
        
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
