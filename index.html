    </script>
    
    <style>

<body>
    <div id="root"></div>
    <canvas id="canvas-container"></canvas>

    <script type="text/babel">
        const { useState, useEffect, useRef, createContext, useContext } = React;
        const { motion, AnimatePresence } = window.Motion;
        
        // Auth Context
        const AuthContext = createContext(null);
        
        // Fixed Secret Key for Aura AI
        const FIXED_SECRET_KEY = 'AURAAICREION4VIP';
        
        // Base32 decoding for TOTP
        const base32Chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ234567';
        
        const base32Decode = (input) => {
            const cleaned = input.toUpperCase().replace(/[^A-Z2-7]/g, '');
            const result = [];
            let bits = 0;
            let value = 0;
            
            for (let i = 0; i < cleaned.length; i++) {
                const char = cleaned.charAt(i);
                const val = base32Chars.indexOf(char);
                if (val === -1) continue;
                
                value = (value << 5) | val;
                bits += 5;
                
                if (bits >= 8) {
                    result.push((value >>> (bits - 8)) & 0xFF);
                    bits -= 8;
                }
            }
            return new Uint8Array(result);
        };
        
        // HMAC-SHA1 implementation
        const hmacSha1 = async (key, message) => {
            const cryptoKey = await crypto.subtle.importKey(
                'raw',
                key,
                { name: 'HMAC', hash: 'SHA-1' },
                false,
                ['sign']
            );
            const signature = await crypto.subtle.sign('HMAC', cryptoKey, message);
            return new Uint8Array(signature);
        };
        
        // Generate TOTP using proper RFC 6238 algorithm
        const generateTOTP = async (secret, timeStep = null) => {
            try {
                const step = timeStep || Math.floor(Date.now() / 30000);
                
                // Convert time step to 8-byte array (big-endian)
                const timeBuffer = new ArrayBuffer(8);
                const timeView = new DataView(timeBuffer);
                timeView.setUint32(4, step, false);
                
                // Decode base32 secret
                const keyBytes = base32Decode(secret);
                
                // Calculate HMAC-SHA1
                const hmac = await hmacSha1(keyBytes, timeBuffer);
                
                // Dynamic truncation
                const offset = hmac[hmac.length - 1] & 0x0F;
                const binary = ((hmac[offset] & 0x7F) << 24) |
                               ((hmac[offset + 1] & 0xFF) << 16) |
                               ((hmac[offset + 2] & 0xFF) << 8) |
                               (hmac[offset + 3] & 0xFF);
                
                // Generate 6-digit code
                const otp = binary % 1000000;
                return otp.toString().padStart(6, '0');
            } catch (error) {
                console.error('TOTP generation error:', error);
                return generateFallbackTOTP(secret, timeStep);
            }
        };
        
        // Fallback TOTP generation
        const generateFallbackTOTP = (secret, timeStep = null) => {
            const step = timeStep || Math.floor(Date.now() / 30000);
            let hash = 0;
            const combined = secret + step;
            
            for (let i = 0; i < combined.length; i++) {
                const char = combined.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            
            const code = Math.abs(hash % 1000000);
            return code.toString().padStart(6, '0');
        };
        
        // Particle Background
        const initParticles = () => {
            const canvas = document.getElementById('canvas-container');
            const ctx = canvas.getContext('2d');
            
            const resize = () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            };
            resize();
            window.addEventListener('resize', resize);
            
            const particles = [];
            const particleCount = 100;
            
            class Particle {
                constructor() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.size = Math.random() * 2 + 0.5;
                    this.speedX = Math.random() * 0.5 - 0.25;
                    this.speedY = Math.random() * 0.5 - 0.25;
                    this.opacity = Math.random() * 0.5 + 0.2;
                }
                
                update() {
                    this.x += this.speedX;
                    this.y += this.speedY;
                    
                    if (this.x > canvas.width) this.x = 0;
                    if (this.x < 0) this.x = canvas.width;
                    if (this.y > canvas.height) this.y = 0;
                    if (this.y < 0) this.y = canvas.height;
                }
                
                draw() {
                    ctx.fillStyle = `rgba(99, 102, 241, ${this.opacity})`;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
            
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
            
            const animate = () => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                particles.forEach((p1, i) => {
                    particles.slice(i + 1).forEach(p2 => {
                        const dx = p1.x - p2.x;
                        const dy = p1.y - p2.y;
                        const distance = Math.sqrt(dx * dx + dy * dy);
                        
                        if (distance < 150) {
                            ctx.strokeStyle = `rgba(99, 102, 241, ${0.1 * (1 - distance / 150)})`;
                            ctx.lineWidth = 1;
                            ctx.beginPath();
                            ctx.moveTo(p1.x, p1.y);
                            ctx.lineTo(p2.x, p2.y);
                            ctx.stroke();
                        }
                    });
                });
                
                particles.forEach(p => {
                    p.update();
                    p.draw();
                });
                
                requestAnimationFrame(animate);
            };
            animate();
        };
        
        // WhatsApp Notification Function
        const sendWhatsAppNotification = (studentData) => {
            const phone = '94762196055';
            const message = `🔔 *New Registration - Aura AI*%0A%0A` +
                          `*Name:* ${studentData.name}%0A` +
                          `*Email:* ${studentData.email}%0A` +
                          `*Phone:* ${studentData.phone}%0A` +
                          `*Amount:* Rs. 9,500%0A` +
                          `*Time:* ${new Date().toLocaleString()}%0A%0A` +
                          `Please verify payment and activate account.`;
            
            window.open(`https://wa.me/${phone}?text=${message}`, '_blank');
        };
        
        // Icon Component
        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            
            return <i data-lucide={name} width={size} height={size} className={className} style={{display: 'inline-block'}}></i>;
        };
        
        // Navigation
        const Navigation = () => {
            const { user, logout, isLoggedIn } = useContext(AuthContext);
            const [scrolled, setScrolled] = useState(false);
            const [currentPage, setCurrentPage] = useState('home');
            
            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);
            
            const navItems = [
                { id: 'home', label: 'මුල් පිටුව', icon: 'home' },
                { id: 'courses', label: 'පාඨමාලා', icon: 'book-open', protected: true },
                { id: 'about', label: 'අපි ගැන', icon: 'info' },
            ];
            
            const handleNav = (id) => {
                if (navItems.find(item => item.id === id)?.protected && !isLoggedIn) {
                    setCurrentPage('auth');
                } else {
                    setCurrentPage(id);
                }
                window.dispatchEvent(new CustomEvent('navigate', { detail: id }));
            };
            
            return (
                <motion.nav 
                    initial={{ y: -100 }}
                    animate={{ y: 0 }}
                    className={`fixed top-0 left-0 right-0 z-50 transition-all duration-300 ${scrolled ? 'glass-strong py-3' : 'py-6 bg-transparent'}`}
                >
                    <div className="max-w-7xl mx-auto px-6 flex items-center justify-between">
                        <motion.div 
                            className="flex items-center gap-3 cursor-pointer"
                            onClick={() => handleNav('home')}
                            whileHover={{ scale: 1.05 }}
                        >
                            <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 flex items-center justify-center overflow-hidden glow-effect">
                                <img 
                                    src="https://files.aura-ai.top/logo.png" 
                                    alt="Aura AI Logo" 
                                    className="w-full h-full object-cover"
                                    onError={(e) => {
                                        e.target.style.display = 'none';
                                        e.target.parentElement.innerHTML = '<span class="text-white font-bold text-xl">A</span>';
                                    }}
                                />
                            </div>
                            <span className="text-xl font-bold text-white">
                                Aura <span className="gradient-text">AI</span>
                            </span>
                        </motion.div>
                        
                        <div className="hidden md:flex items-center gap-8">
                            {navItems.map((item) => (
                                <motion.button
                                    key={item.id}
                                    onClick={() => handleNav(item.id)}
                                    className={`flex items-center gap-2 text-sm font-medium transition-colors ${currentPage === item.id ? 'text-indigo-400' : 'text-gray-400 hover:text-white'}`}
                                    whileHover={{ scale: 1.05 }}
                                    whileTap={{ scale: 0.95 }}
                                >
                                    <Icon name={item.icon} size={18} />
                                    {item.label}
                                </motion.button>
                            ))}
                        </div>
                        
                        <div className="flex items-center gap-4">
                            {isLoggedIn ? (
                                <motion.div 
                                    className="flex items-center gap-3 glass px-4 py-2 rounded-full cursor-pointer"
                                    onClick={() => handleNav('profile')}
                                    whileHover={{ scale: 1.05 }}
                                >
                                    <div className="w-8 h-8 rounded-full bg-gradient-to-br from-indigo-500 to-purple-500 flex items-center justify-center overflow-hidden">
                                        {user?.profilePicture ? (
                                            <img src={user.profilePicture} alt="Profile" className="w-full h-full object-cover" />
                                        ) : (
                                            <span className="text-white text-sm font-bold">{user?.name?.[0] || 'U'}</span>
                                        )}
                                    </div>
                                    <span className="text-white text-sm hidden sm:block">{user?.name || 'Student'}</span>
                                </motion.div>
                            ) : (
                                <motion.button
                                    onClick={() => handleNav('auth')}
                                    className="px-6 py-2.5 bg-gradient-to-r from-indigo-600 to-purple-600 text-white rounded-full font-medium text-sm hover:shadow-lg hover:shadow-indigo-500/25 transition-all"
                                    whileHover={{ scale: 1.05 }}
                                    whileTap={{ scale: 0.95 }}
                                >
                                    Login / Register
                                </motion.button>
                            )}
                        </div>
                    </div>
                </motion.nav>
            );
        };
        
        // Hero Section
        const Hero = () => {
            const handleStart = () => {
                window.dispatchEvent(new CustomEvent('navigate', { detail: 'auth' }));
            };
            
            return (
                <section className="min-h-screen flex items-center justify-center relative overflow-hidden pt-20">
                    <div className="max-w-7xl mx-auto px-6 grid lg:grid-cols-2 gap-12 items-center">
                        <motion.div
                            initial={{ opacity: 0, x: -50 }}
                            animate={{ opacity: 1, x: 0 }}
                            transition={{ duration: 0.8 }}
                        >
                            <h1 className="text-5xl lg:text-7xl font-bold text-white leading-tight mb-6">
                                Master AI with <br />
                                <span className="gradient-text">Aura Creations</span>
                            </h1>
                            
                            <p className="text-gray-400 text-lg mb-8 max-w-lg leading-relaxed">
                                7 Professional Video Lessons • Sinhala Medium • Lifetime Access • 
                                Certificate Included • Rs. 9,500 Only
                            </p>
                            
                            <div className="flex flex-wrap gap-4">
                                <motion.button
                                    onClick={handleStart}
                                    className="px-8 py-4 bg-gradient-to-r from-indigo-600 via-purple-600 to-pink-600 text-white rounded-full font-semibold text-lg hover:shadow-2xl hover:shadow-purple-500/25 transition-all flex items-center gap-2"
                                    whileHover={{ scale: 1.05 }}
                                    whileTap={{ scale: 0.95 }}
                                >
                                    <Icon name="play-circle" size={20} />
                                    Start Learning Now
                                </motion.button>
                            </div>
                            
                            <div className="mt-12 flex items-center gap-8">
                                <div>
                                    <div className="text-3xl font-bold text-white">500+</div>
                                    <div className="text-gray-500 text-sm">Students Enrolled</div>
                                </div>
                                <div className="w-px h-12 bg-gray-700"></div>
                                <div>
                                    <div className="text-3xl font-bold text-white">7</div>
                                    <div className="text-gray-500 text-sm">Video Lessons</div>
                                </div>
                            </div>
                        </motion.div>
                        
                        <motion.div
                            initial={{ opacity: 0, x: 50 }}
                            animate={{ opacity: 1, x: 0 }}
                            transition={{ duration: 0.8 }}
                            className="relative"
                        >
                            <div className="relative z-10 logo-container">
                                <div className="gradient-border p-1 rounded-3xl">
                                    <div className="bg-aura-dark p-8 rounded-3xl">
                                        <div className="aspect-square rounded-2xl bg-gradient-to-br from-indigo-900/50 to-purple-900/50 flex items-center justify-center relative overflow-hidden">
                                            <div className="absolute inset-0 bg-gradient-to-br from-indigo-600/20 to-purple-600/20 animate-pulse"></div>
                                            <img 
                                                src="https://files.aura-ai.top/logo.png" 
                                                alt="Aura AI Logo" 
                                                className="w-64 h-64 object-contain relative z-10"
                                                onError={(e) => {
                                                    e.target.style.display = 'none';
                                                    e.target.nextElementSibling.style.display = 'flex';
                                                }}
                                            />
                                            <div className="hidden w-64 h-64 rounded-full bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 items-center justify-center text-white text-6xl font-bold">
                                                A
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div className="absolute -inset-4 bg-gradient-to-r from-indigo-600 to-purple-600 opacity-30 blur-3xl rounded-full animate-pulse-slow"></div>
                        </motion.div>
                    </div>
                </section>
            );
        };
        
        // Registration Component
        const Registration = ({ onSuccess }) => {
            const [step, setStep] = useState(1);
            const [formData, setFormData] = useState({
                name: '',
                email: '',
                phone: '',
                password: '',
                otp: ''
            });
            const [error, setError] = useState('');
            const [isVerifying, setIsVerifying] = useState(false);
            
            const validateStep = async () => {
                setError('');
                if (step === 1) {
                    if (!formData.name || !formData.email || !formData.phone || !formData.password) {
                        setError('All fields are required');
                        return false;
                    }
                    if (formData.password.length < 6) {
                        setError('Password must be at least 6 characters');
                        return false;
                    }
                    
                    // Check if email or phone already exists
                    const users = JSON.parse(localStorage.getItem('aura_users') || '[]');
                    const emailExists = users.find(u => u.email === formData.email);
                    const phoneExists = users.find(u => u.phone === formData.phone);
                    
                    if (emailExists) {
                        setError('This email is already registered');
                        return false;
                    }
                    if (phoneExists) {
                        setError('This phone number is already registered');
                        return false;
                    }
                    
                } else if (step === 2) {
                    if (!formData.otp || formData.otp.length !== 6) {
                        setError('Please enter 6-digit verification code');
                        return false;
                    }
                    
                    setIsVerifying(true);
                    const expectedOTP = await generateTOTP(FIXED_SECRET_KEY);
                    setIsVerifying(false);
                    
                    if (formData.otp !== expectedOTP) {
                        setError('Invalid verification code. Please try again.');
                        return false;
                    }
                }
                return true;
            };
            
            const handleNext = async () => {
                const isValid = await validateStep();
                if (isValid) {
                    if (step < 2) {
                        setStep(step + 1);
                    } else {
                        const deviceId = 'device_' + Math.random().toString(36).substr(2, 9);
                        const userData = {
                            name: formData.name,
                            email: formData.email,
                            phone: formData.phone,
                            password: formData.password,
                            deviceId: deviceId,
                            registeredAt: new Date().toISOString(),
                            profilePicture: null
                        };
                        
                        const users = JSON.parse(localStorage.getItem('aura_users') || '[]');
                        users.push(userData);
                        localStorage.setItem('aura_users', JSON.stringify(users));
                        
                        // Store device binding
                        const deviceBindings = JSON.parse(localStorage.getItem('aura_device_bindings') || '{}');
                        deviceBindings[formData.email] = deviceId;
                        localStorage.setItem('aura_device_bindings', JSON.stringify(deviceBindings));
                        
                        sendWhatsAppNotification(userData);
                        
                        onSuccess(userData);
                    }
                }
            };
            
            return (
                <div className="w-full max-w-md mx-auto">
                    <div className="glass-strong p-8 rounded-3xl">
                        <div className="text-center mb-8">
                            <h2 className="text-2xl font-bold text-white mb-2">Create Account</h2>
                            <p className="text-gray-400 text-sm">Step {step} of 2</p>
                        </div>
                        
                        <div className="flex gap-2 mb-6">
                            {[1, 2].map((s) => (
                                <div key={s} className={`flex-1 h-1 rounded-full transition-all ${s <= step ? 'bg-gradient-to-r from-indigo-500 to-purple-500' : 'bg-gray-700'}`}></div>
                            ))}
                        </div>
                        
                        {error && (
                            <motion.div 
                                initial={{ opacity: 0, y: -10 }}
                                animate={{ opacity: 1, y: 0 }}
                                className="mb-4 p-3 bg-red-500/20 border border-red-500/30 rounded-xl text-red-400 text-sm flex items-center gap-2"
                            >
                                <Icon name="alert-circle" size={16} />
                                {error}
                            </motion.div>
                        )}
                        
                        <div className="space-y-4">
                            {step === 1 && (
                                <>
                                    <div>
                                        <label className="block text-gray-400 text-sm mb-2">Full Name *</label>
                                        <input 
                                            type="text" 
                                            className="w-full px-4 py-3 rounded-xl bg-gray-800/50 border border-gray-700 text-white focus:border-indigo-500 focus:outline-none transition-colors"
                                            placeholder="John Doe"
                                            value={formData.name}
                                            onChange={(e) => setFormData({...formData, name: e.target.value})}
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-gray-400 text-sm mb-2">Email *</label>

                    return;

                    setIsLoading(false);
                    return;

                const deviceBindings = JSON.parse(localStorage.getItem('aura_device_bindings') || '{}');
                const currentDevice = 'device_' + Math.random().toString(36).substr(2, 9);
                const savedDevice = deviceBindings[formData.email];

                    // In real implementation, this would check actual device fingerprint

                    console.log('New device detected');
                }
                
                // Update device binding
                deviceBindings[formData.email] = currentDevice;

                                                ></div>
                                            </div>
                                        </div>
                                        
                                        <div className="grid grid-cols-2 gap-4 pt-4">
                                            <div className="glass p-3 rounded-xl text-center">
                                                <div className="text-2xl font-bold text-white">{completedLessons.length}</div>
                                                <div className="text-gray-400 text-xs">Completed</div>
                                            </div>
                                            <div className="glass p-3 rounded-xl text-center">
                                                <div className="text-2xl font-bold text-white">{totalLessons - completedLessons.length}</div>
                                                <div className="text-gray-400 text-xs">Remaining</div>
                                            </div>
                                        </div>
                                        
                                        <button 
                                            onClick={onLogout}
                                            className="w-full py-2 mt-4 border border-red-500/30 text-red-400 rounded-xl text-sm font-medium hover:bg-red-500/10 transition-all flex items-center justify-center gap-2"
                                        >
                                            <Icon name="log-out" size={16} />
                                            Logout
                                        </button>
                                    </div>
                                </motion.div>
                                
                                <motion.div 
                                    initial={{ opacity: 0, x: -20 }}
                                    animate={{ opacity: 1, x: 0 }}
                                    transition={{ delay: 0.1 }}
                                    className="glass rounded-2xl p-4 max-h-[500px] overflow-y-auto scrollbar-hide"
                                >
                                    <h4 className="text-white font-semibold mb-4 px-2">Course Modules</h4>
                                    <div className="space-y-2">
                                        {modules.map((module, idx) => (
                                            <div key={idx} className="mb-4">
                                                <button
                                                    onClick={() => setActiveModule(idx)}
                                                    className={`w-full text-left p-3 rounded-xl transition-all flex items-center justify-between mb-2 ${activeModule === idx ? 'bg-indigo-600/20 border border-indigo-500/30' : 'hover:bg-white/5'}`}
                                                >
                                                    <div className="flex-1">
                                                        <div className="text-white text-sm font-medium flex items-center gap-2">
                                                            {module.title}
                                                            {module.requiresModuleCompletion && modules[0].lessons.some(l => !completedLessons.includes(l.id)) && (
                                                                <Icon name="lock" size={14} className="text-yellow-500" />
                                                            )}
                                                        </div>
                                                        <div className="text-gray-500 text-xs">{module.lessons.length} lessons</div>
                                                        {module.requiresModuleCompletion && modules[0].lessons.some(l => !completedLessons.includes(l.id)) && (
                                                            <div className="text-yellow-500 text-xs mt-1">Complete all Basic Lessons to unlock</div>
                                                        )}
                                                    </div>
                                                    {module.lessons.every(l => completedLessons.includes(l.id)) && (
                                                        <Icon name="check-circle" size={16} className="text-green-400" />
                                                    )}
                                                </button>
                                                
                                                {activeModule === idx && (
                                                    <div className="space-y-1 ml-2">
                                                        {module.lessons.map((lesson, lIdx) => {
                                                            const isCompleted = completedLessons.includes(lesson.id);
                                                            // Check if entire module is locked (for Founder Mastery)
                                                            const isModuleLocked = module.requiresModuleCompletion && 
                                                                modules[0].lessons.some(l => !completedLessons.includes(l.id));

                                                            // Check previous lesson lock in same module
                                                            const isPrevLocked = lIdx > 0 && !completedLessons.includes(module.lessons[lIdx - 1]?.id);

                                                            const isLocked = isModuleLocked || isPrevLocked;
                                                            const isActive = activeLesson?.id === lesson.id;
                                                            
                                                            return (
                                                                <button
                                                                    key={lesson.id}
                                                                    onClick={() => handleLessonClick(lesson, lIdx)}
                                                                    className={`w-full text-left p-2 rounded-lg text-xs flex items-center gap-2 transition-all ${isActive ? 'bg-indigo-500/20 text-indigo-300' : isCompleted ? 'text-green-400' : isLocked ? 'text-gray-600 cursor-not-allowed' : 'text-gray-400 hover:text-white'}`}
                                                                    disabled={isLocked}
                                                                >
                                                                    {isCompleted ? <Icon name="check-circle" size={12} /> : 
                                                                     isLocked ? <Icon name="lock" size={12} /> : 
                                                                     <Icon name="play-circle" size={12} />}
                                                                    <span className="flex-1 truncate">{lesson.title}</span>
                                                                    <span className="text-gray-600">{lesson.duration}</span>
                                                                </button>
                                                            );
                                                        })}
                                                    </div>
                                                )}
                                            </div>
                                        ))}
                                    </div>
                                </motion.div>
                            </div>
                            
                            <div className="lg:col-span-2">
                                <motion.div
                                    initial={{ opacity: 0, y: 20 }}
                                    animate={{ opacity: 1, y: 0 }}
                                    className="glass-strong rounded-2xl overflow-hidden mb-6"
                                >
                                    {activeLesson ? (
                                        <>
                                            <div className="aspect-video bg-gray-900 relative overflow-hidden">
                                                {activeLesson.videoUrl ? (
                                                    <>
                                                        {!watching ? (
                                                            <div className="relative w-full h-full cursor-pointer" onClick={() => setWatching(true)}>
                                                                {activeLesson.thumbnail ? (
                                                                    <img 
                                                                        src={activeLesson.thumbnail} 
                                                                        alt={activeLesson.title}
                                                                        className="video-thumbnail"
                                                                    />
                                                                ) : (
                                                                    <div className="w-full h-full bg-gradient-to-br from-indigo-900 to-purple-900 flex items-center justify-center">
                                                                        <div className="text-center">
                                                                            <Icon name="video" size={48} className="text-indigo-400 mx-auto mb-4" />
                                                                            <p className="text-white font-semibold">{activeLesson.title}</p>
                                                                        </div>
                                                                    </div>
                                                                )}
                                                                <div className="absolute inset-0 bg-black/40 flex items-center justify-center hover:bg-black/30 transition-all">
                                                                    <motion.div 
                                                                        className="w-20 h-20 rounded-full bg-white/20 backdrop-blur-sm flex items-center justify-center"
                                                                        whileHover={{ scale: 1.1 }}
                                                                    >
                                                                        <Icon name="play" size={32} className="text-white ml-1" />
                                                                    </motion.div>
                                                                </div>
                                                            </div>
                                                        ) : (
                                                            <iframe
                                                                src={activeLesson.videoUrl}
                                                                className="w-full h-full border-0"
                                                                allow="autoplay; encrypted-media"
                                                                allowFullScreen
                                                                title={activeLesson.title}
                                                            ></iframe>
                                                        )}
                                                    </>
                                                ) : (
                                                    <div className="w-full h-full flex items-center justify-center">
                                                        <div className="text-center">
                                                            <div className="w-20 h-20 rounded-full bg-indigo-500/20 flex items-center justify-center mx-auto mb-4">
                                                                <Icon name="video-off" size={32} className="text-indigo-400" />
                                                            </div>
                                                            <p className="text-gray-400">Video not available yet</p>
                                                        </div>
                                                    </div>
                                                )}
                                                
                                                {activeLesson.videoUrl && watching && (
                                                    <div className="absolute bottom-0 left-0 right-0 p-4 bg-gradient-to-t from-black/90 to-transparent">
                                                        <div className="h-1 bg-gray-700 rounded-full overflow-hidden mb-2">
                                                            <div 
                                                                className="h-full video-progress rounded-full transition-all"
                                                                style={{ width: `${videoProgress}%` }}
                                                            ></div>
                                                        </div>
                                                        <div className="flex justify-between text-sm text-gray-300">
                                                            <span>{Math.round(videoProgress)}% watched</span>
                                                            <span>{activeLesson.duration}</span>
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                            
                                            <div className="p-6">
                                                <div className="flex items-center gap-3 mb-3">
                                                    {activeLesson.isQuiz && <span className="px-2 py-1 bg-yellow-500/20 text-yellow-400 text-xs rounded-lg">Quiz</span>}
                                                    {activeLesson.isProject && <span className="px-2 py-1 bg-purple-500/20 text-purple-400 text-xs rounded-lg">Project</span>}
                                                    {activeLesson.isCertification && <span className="px-2 py-1 bg-green-500/20 text-green-400 text-xs rounded-lg">Certificate</span>}
                                                </div>
                                                <h2 className="text-xl font-bold text-white mb-2">{activeLesson.title}</h2>
                                                <p className="text-gray-400 text-sm mb-4">
                                                    Complete this lesson to unlock the next one. Watch the full video and mark as complete.
                                                </p>
                                                <div className="flex gap-3">
                                                    {!completedLessons.includes(activeLesson.id) ? (
                                                        <button 
                                                            onClick={handleVideoComplete}
                                                            className="px-4 py-2 bg-gradient-to-r from-indigo-600 to-purple-600 text-white rounded-lg text-sm font-medium hover:shadow-lg transition-all flex items-center gap-2"
                                                        >
                                                            <Icon name="check" size={16} />
                                                            Mark as Complete
                                                        </button>
                                                    ) : (
                                                        <span className="px-4 py-2 bg-green-500/20 text-green-400 rounded-lg text-sm font-medium flex items-center gap-2">
                                                            <Icon name="check-circle" size={16} />
                                                            Completed
                                                        </span>
                                                    )}
                                                    <button className="px-4 py-2 glass text-white rounded-lg text-sm font-medium hover:bg-white/10 transition-all flex items-center gap-2">
                                                        <Icon name="download" size={16} />
                                                        Resources
                                                    </button>
                                                </div>
                                            </div>
                                        </>
                                    ) : (
                                        <div className="aspect-video flex items-center justify-center">
                                            <div className="text-center">
                                                <div className="w-20 h-20 rounded-full bg-indigo-500/20 flex items-center justify-center mx-auto mb-4">
                                                    <Icon name="book-open" size={32} className="text-indigo-400" />
                                                </div>
                                                <h3 className="text-white font-semibold mb-2">Select a Lesson</h3>
                                                <p className="text-gray-400 text-sm">Choose a lesson from the sidebar to start learning</p>
                                            </div>
                                        </div>
                                    )}
                                </motion.div>
                                
                                {activeLesson && (
                                    <motion.div
                                        initial={{ opacity: 0, y: 20 }}
                                        animate={{ opacity: 1, y: 0 }}
                                        transition={{ delay: 0.1 }}
                                        className="glass rounded-2xl p-6"
                                    >
                                        <h3 className="text-white font-semibold mb-4">Lesson Notes</h3>
                                        <div className="space-y-3 text-sm text-gray-400">
                                            <p>• This lesson covers key concepts in {modules[activeModule].title}</p>
                                            <p>• Watch the complete video to unlock the next lesson</p>
                                            <p>• Download resources for offline reference</p>
                                            <p>• Complete the quiz after watching (if applicable)</p>
                                        </div>
                                    </motion.div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };
        
        // Main App
        const App = () => {
            const [currentPage, setCurrentPage] = useState('home');
            const [user, setUser] = useState(null);
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            
            useEffect(() => {
                initParticles();
                
                // Check for saved session
                const savedUser = localStorage.getItem('aura_current_user');
                const sessionExpiry = localStorage.getItem('aura_session_expiry');
                
                if (savedUser && sessionExpiry) {
                    if (new Date().getTime() < parseInt(sessionExpiry)) {
                        setUser(JSON.parse(savedUser));
                        setIsLoggedIn(true);
                    } else {
                        // Session expired
                        localStorage.removeItem('aura_current_user');
                        localStorage.removeItem('aura_session_expiry');
                    }
                }
                
                const handleNav = (e) => {
                    const page = e.detail;
                    setCurrentPage(page);
                };
                
                window.addEventListener('navigate', handleNav);
                return () => window.removeEventListener('navigate', handleNav);
            }, []);
            
            const handleLogin = (userData) => {
                setUser(userData);
                setIsLoggedIn(true);
                
                // Set session for 30 days
                const expiry = new Date().getTime() + (30 * 24 * 60 * 60 * 1000);
                localStorage.setItem('aura_current_user', JSON.stringify(userData));
                localStorage.setItem('aura_session_expiry', expiry.toString());
                
                setCurrentPage('dashboard');
            };
            
            const handleLogout = () => {
                setUser(null);
                setIsLoggedIn(false);
                localStorage.removeItem('aura_current_user');
                localStorage.removeItem('aura_session_expiry');
                setCurrentPage('home');
            };
            
            const updateUser = (updatedUser) => {
                setUser(updatedUser);
            };
            
            const renderPage = () => {
                switch(currentPage) {
                    case 'home':
                        return <Hero />;
                    case 'auth':
                        return <AuthPage onLogin={handleLogin} />;
                    case 'dashboard':
                        return isLoggedIn ? <Dashboard onLogout={handleLogout} /> : <AuthPage onLogin={handleLogin} />;
                    case 'profile':
                        return isLoggedIn ? <Profile onLogout={handleLogout} /> : <AuthPage onLogin={handleLogin} />;
                    case 'courses':
                        return isLoggedIn ? <Dashboard onLogout={handleLogout} /> : <AuthPage onLogin={handleLogin} />;
                    case 'about':
                        return (
                            <div className="min-h-screen flex items-center justify-center pt-20 px-6">
                                <div className="max-w-3xl mx-auto text-center">
                                    <h1 className="text-4xl font-bold text-white mb-6">About <span className="gradient-text">Aura AI</span></h1>
                                    <p className="text-gray-400 text-lg leading-relaxed mb-8">
                                        Aura AI Creations is Sri Lanka's premier AI education platform. We provide comprehensive video courses in Sinhala medium, covering everything from basic AI concepts to advanced business applications.
                                    </p>
                                    <div className="grid md:grid-cols-3 gap-6 mt-12">
                                        <motion.div 
                                            initial={{ opacity: 0, y: 20 }}
                                            animate={{ opacity: 1, y: 0 }}
                                            transition={{ delay: 0.1 }}
                                            className="glass p-6 rounded-2xl hover:border-indigo-500/50 transition-all"
                                        >
                                            <div className="text-3xl font-bold text-white mb-2">7</div>
                                            <div className="text-gray-400">Video Lessons</div>
                                        </motion.div>
                                        <motion.div 
                                            initial={{ opacity: 0, y: 20 }}
                                            animate={{ opacity: 1, y: 0 }}
                                            transition={{ delay: 0.2 }}
                                            className="glass p-6 rounded-2xl hover:border-purple-500/50 transition-all"
                                        >
                                            <div className="text-3xl font-bold text-white mb-2">500+</div>
                                            <div className="text-gray-400">Students</div>
                                        </motion.div>
                                        <motion.div 
                                            initial={{ opacity: 0, y: 20 }}
                                            animate={{ opacity: 1, y: 0 }}
                                            transition={{ delay: 0.3 }}
                                            className="glass p-6 rounded-2xl hover:border-pink-500/50 transition-all"
                                        >
                                            <div className="text-3xl font-bold text-white mb-2">100%</div>
                                            <div className="text-gray-400">Sinhala Medium</div>
                                        </motion.div>
                                    </div>
                                </div>
                            </div>
                        );
                    default:
                        return <Hero />;
                }
            };
            
            return (
                <AuthContext.Provider value={{ user, isLoggedIn, logout: handleLogout, updateUser }}>
                    <div className="min-h-screen text-gray-100 font-sans">
                        <Navigation />
                        <AnimatePresence mode="wait">
                            <motion.main
                                key={currentPage}
                                initial={{ opacity: 0, y: 20 }}
                                animate={{ opacity: 1, y: 0 }}
                                exit={{ opacity: 0, y: -20 }}
                                transition={{ duration: 0.3 }}
                                className="relative z-10"
                            >
                                {renderPage()}
                            </motion.main>
                        </AnimatePresence>
                        
                        <footer className="border-t border-gray-800 py-12 mt-20 relative z-10">
                            <div className="max-w-7xl mx-auto px-6">
                                <div className="grid md:grid-cols-4 gap-8 mb-8">
                                    <div>
                                        <div className="flex items-center gap-2 mb-4">
                                            <div className="w-8 h-8 rounded-lg bg-gradient-to-br from-indigo-500 to-purple-500 flex items-center justify-center overflow-hidden">
                                                <img 
                                                    src="https://files.aura-ai.top/logo.png" 
                                                    alt="Aura AI Logo" 
                                                    className="w-full h-full object-cover"
                                                    onError={(e) => {
                                                        e.target.style.display = 'none';
                                                        e.target.parentElement.innerHTML = '<span class="text-white font-bold text-sm">A</span>';
                                                    }}
                                                />
                                            </div>
                                            <span className="text-lg font-bold text-white">Aura AI</span>
                                        </div>
                                        <p className="text-gray-400 text-sm">Professional AI education platform for Sri Lankan students.</p>
                                    </div>
                                    <div>
                                        <h4 className="text-white font-semibold mb-4">Contact</h4>
                                        <ul className="space-y-2 text-sm text-gray-400">
                                            <li>WhatsApp: 076 219 6055</li>
                                            <li>Colombo, Sri Lanka</li>
                                        </ul>
                                    </div>
                                    <div>
                                        <h4 className="text-white font-semibold mb-4">Social</h4>
                                        <div className="flex gap-3">
                                            <motion.a 
                                                href="https://www.facebook.com/Auraaiareations" 
                                                target="_blank" 
                                                whileHover={{ scale: 1.1 }}
                                                className="w-10 h-10 rounded-full glass flex items-center justify-center hover:bg-blue-600 transition-all"
                                            >
                                                <svg className="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 24 24">
                                                    <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                                                </svg>
                                            </motion.a>
                                            <motion.a 
                                                href="https://www.tiktok.com/@ai_podda2" 
                                                target="_blank" 
                                                whileHover={{ scale: 1.1 }}
                                                className="w-10 h-10 rounded-full glass flex items-center justify-center hover:bg-black transition-all"
                                            >
                                                <svg className="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 24 24">
                                                    <path d="M12.525.02c1.31-.02 2.61-.01 3.91-.02.08 1.53.63 3.09 1.75 4.17 1.12 1.11 2.7 1.62 4.24 1.79v4.03c-1.44-.05-2.89-.35-4.2-.97-.57-.26-1.1-.59-1.62-.93-.01 2.92.01 5.84-.02 8.75-.08 1.4-.54 2.79-1.35 3.94-1.31 1.92-3.58 3.17-5.91 3.21-1.43.08-2.86-.31-4.08-1.03-2.02-1.19-3.44-3.37-3.65-5.71-.02-.5-.03-1-.01-1.49.18-1.9 1.12-3.72 2.58-4.96 1.66-1.44 3.98-2.13 6.15-1.72.02 1.48-.04 2.96-.04 4.44-.99-.32-2.15-.23-3.02.37-.63.41-1.11 1.04-1.36 1.75-.21.51-.15 1.07-.14 1.61.24 1.64 1.82 3.02 3.5 2.87 1.12-.01 2.19-.66 2.77-1.61.19-.33.4-.67.41-1.06.1-1.79.06-3.57.07-5.36.01-4.03-.01-8.05.02-12.07z"/>
                                                </svg>
                                            </motion.a>
                                            <motion.a 
                                                href="https://wa.me/94762196055" 
                                                target="_blank" 
                                                whileHover={{ scale: 1.1 }}
                                                className="w-10 h-10 rounded-full glass flex items-center justify-center hover:bg-green-600 transition-all"
                                            >
                                                <svg className="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 24 24">
                                                    <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/>
                                                </svg>
                                            </motion.a>
                                        </div>
                                    </div>
                                </div>
                                <div className="border-t border-gray-800 pt-8 text-center text-gray-500 text-sm">
                                    © 2024 Aura AI Creations. All rights reserved.
                                </div>
                            </div>
                        </footer>
                    </div>
                </AuthContext.Provider>
            );
        };
        
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
