<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura AI Creations - AI Video Course Platform</title>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Noto+Sans+Sinhala:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'Noto Sans Sinhala', 'sans-serif'],
                    },
                    colors: {
                        aura: {
                            primary: '#6366f1',
                            secondary: '#8b5cf6',
                            accent: '#ec4899',
                            dark: '#0f172a',
                            darker: '#020617',
                        }
                    },
                    animation: {
                        'gradient': 'gradient 8s linear infinite',
                        'float': 'float 6s ease-in-out infinite',
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'glow': 'glow 2s ease-in-out infinite alternate',
                    },
                    keyframes: {
                        gradient: { '0%, 100%': { backgroundPosition: '0% 50%' }, '50%': { backgroundPosition: '100% 50%' } },
                        float: { '0%, 100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-20px)' } },
                        glow: { '0%': { boxShadow: '0 0 5px #6366f1, 0 0 10px #6366f1' }, '100%': { boxShadow: '0 0 20px #6366f1, 0 0 30px #8b5cf6' } }
                    }
                }
            }
        }
    </script>
    
    <style>
        body { background: #020617; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .glass-strong { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(99, 102, 241, 0.2); }
        .gradient-text { background: linear-gradient(135deg, #6366f1 0%, #ec4899 50%, #8b5cf6 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        #canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
        .video-progress { background: linear-gradient(90deg, #6366f1 0%, #ec4899 100%); }
        .logo-container { animation: float 6s ease-in-out infinite; }
        .gradient-border { position: relative; background: linear-gradient(135deg, #6366f1, #ec4899, #8b5cf6); padding: 2px; border-radius: 1rem; }
        .video-thumbnail { width: 100%; height: 100%; object-fit: cover; border-radius: 1rem; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <canvas id="canvas-container"></canvas>

    <script type="text/babel">
        const { useState, useEffect, useRef, createContext, useContext } = React;
        const { motion, AnimatePresence } = window.Motion;
        const AuthContext = createContext(null);
        const FIXED_SECRET_KEY = 'AURAAICREION4VIP';

        // --- Utils ---
        const base32Decode = (input) => {
            const cleaned = input.toUpperCase().replace(/[^A-Z2-7]/g, '');
            const result = []; let bits = 0; let value = 0;
            for (let i = 0; i < cleaned.length; i++) {
                const char = cleaned.charAt(i);
                const val = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ234567'.indexOf(char);
                if (val === -1) continue;
                value = (value << 5) | val; bits += 5;
                if (bits >= 8) { result.push((value >>> (bits - 8)) & 0xFF); bits -= 8; }
            }
            return new Uint8Array(result);
        };

        const hmacSha1 = async (key, message) => {
            const cryptoKey = await crypto.subtle.importKey('raw', key, { name: 'HMAC', hash: 'SHA-1' }, false, ['sign']);
            const signature = await crypto.subtle.sign('HMAC', cryptoKey, message);
            return new Uint8Array(signature);
        };

        const generateTOTP = async (secret) => {
            try {
                const step = Math.floor(Date.now() / 30000);
                const timeBuffer = new ArrayBuffer(8);
                new DataView(timeBuffer).setUint32(4, step, false);
                const keyBytes = base32Decode(secret);
                const hmac = await hmacSha1(keyBytes, timeBuffer);
                const offset = hmac[hmac.length - 1] & 0x0F;
                const binary = ((hmac[offset] & 0x7F) << 24) | ((hmac[offset + 1] & 0xFF) << 16) | ((hmac[offset + 2] & 0xFF) << 8) | (hmac[offset + 3] & 0xFF);
                return (binary % 1000000).toString().padStart(6, '0');
            } catch (e) { return "000000"; }
        };

        // --- Background ---
        const initParticles = () => {
            const canvas = document.getElementById('canvas-container');
            const ctx = canvas.getContext('2d');
            const resize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
            resize(); window.addEventListener('resize', resize);
            const particles = Array.from({ length: 100 }, () => ({
                x: Math.random() * canvas.width, y: Math.random() * canvas.height,
                size: Math.random() * 2 + 0.5, sx: Math.random() * 0.5 - 0.25, sy: Math.random() * 0.5 - 0.25, o: Math.random() * 0.5 + 0.2
            }));
            const animate = () => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(p => {
                    p.x += p.sx; p.y += p.sy;
                    if (p.x > canvas.width) p.x = 0; if (p.x < 0) p.x = canvas.width;
                    if (p.y > canvas.height) p.y = 0; if (p.y < 0) p.y = canvas.height;
                    ctx.fillStyle = `rgba(99, 102, 241, ${p.o})`;
                    ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
                });
                requestAnimationFrame(animate);
            };
            animate();
        };

        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} width={size} height={size} className={className} style={{display: 'inline-block'}}></i>;
        };

        // --- Components ---
        const Navigation = () => {
            const { user, isLoggedIn } = useContext(AuthContext);
            const [scrolled, setScrolled] = useState(false);
            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const navAction = (page) => window.dispatchEvent(new CustomEvent('navigate', { detail: page }));

            return (
                <motion.nav className={`fixed top-0 left-0 right-0 z-50 transition-all duration-300 ${scrolled ? 'glass-strong py-3' : 'py-6 bg-transparent'}`}>
                    <div className="max-w-7xl mx-auto px-6 flex items-center justify-between">
                        <div className="flex items-center gap-3 cursor-pointer" onClick={() => navAction('home')}>
                            <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-indigo-500 to-pink-500 flex items-center justify-center overflow-hidden"><img src="https://files.aura-ai.top/logo.png" className="w-full h-full object-cover" /></div>
                            <span className="text-xl font-bold text-white">Aura <span className="gradient-text">AI</span></span>
                        </div>
                        <div className="flex items-center gap-4">
                            {isLoggedIn ? (
                                <div onClick={() => navAction('profile')} className="flex items-center gap-3 glass px-4 py-2 rounded-full cursor-pointer">
                                    <div className="w-8 h-8 rounded-full bg-indigo-500 flex items-center justify-center text-xs font-bold text-white overflow-hidden">
                                        {user?.profilePicture ? <img src={user.profilePicture} /> : user?.name?.[0]}
                                    </div>
                                    <span className="text-white text-sm hidden sm:block">{user?.name}</span>
                                </div>
                            ) : (
                                <button onClick={() => navAction('auth')} className="px-6 py-2 bg-indigo-600 text-white rounded-full text-sm font-medium">Login</button>
                            )}
                        </div>
                    </div>
                </motion.nav>
            );
        };

        const Hero = () => (
            <section className="min-h-screen flex items-center justify-center pt-20">
                <div className="max-w-7xl mx-auto px-6 grid lg:grid-cols-2 gap-12 items-center">
                    <motion.div initial={{ opacity: 0, x: -30 }} animate={{ opacity: 1, x: 0 }}>
                        <h1 className="text-5xl lg:text-7xl font-bold text-white leading-tight mb-6">Master AI with <br/><span className="gradient-text">Aura Creations</span></h1>
                        <p className="text-gray-400 text-lg mb-8">Professional Video Lessons • Sinhala Medium • Lifetime Access • Rs. 9,500 Only</p>
                        <button onClick={() => window.dispatchEvent(new CustomEvent('navigate', { detail: 'auth' }))} className="px-8 py-4 bg-gradient-to-r from-indigo-600 to-purple-600 text-white rounded-full font-semibold flex items-center gap-2">
                            <Icon name="play-circle" /> Start Learning Now
                        </button>
                    </motion.div>
                    <div className="relative logo-container hidden lg:block">
                        <div className="gradient-border p-1 rounded-3xl"><div className="bg-aura-dark p-8 rounded-3xl"><img src="https://files.aura-ai.top/logo.png" className="w-64 h-64 object-contain" /></div></div>
                    </div>
                </div>
            </section>
        );

        const Dashboard = ({ onLogout }) => {
            const { user } = useContext(AuthContext);
            const [activeModule, setActiveModule] = useState(0);
            const [activeLesson, setActiveLesson] = useState(null);
            const [completedLessons, setCompletedLessons] = useState([]);
            const [watching, setWatching] = useState(false);
            const [moduleError, setModuleError] = useState('');

            const modules = [
                { 
                    title: 'AI Foundations - Basic Lessons', 
                    lessons: [
                        { id: 1, title: 'AI හැදින්විම (Introduction to AI)', duration: '15:00', videoUrl: 'https://drive.google.com/file/d/1GZ-h7SIAG5bOIavwLng1Sh1N2BdUmIW6/preview', thumbnail: 'https://drive.google.com/thumbnail?id=1GZ-h7SIAG5bOIavwLng1Sh1N2BdUmIW6&sz=w1000' },
                        { id: 2, title: 'Lesson 1 - AI Basics', duration: '12:30', videoUrl: 'https://drive.google.com/file/d/10-4GWQ_FAcUNrdnC3zqtOnGXSmsX2Y2R/preview', thumbnail: 'https://drive.google.com/thumbnail?id=10-4GWQ_FAcUNrdnC3zqtOnGXSmsX2Y2R&sz=w1000' },
                        { id: 3, title: 'Lesson 2 - Getting Started', duration: '18:45', videoUrl: 'https://drive.google.com/file/d/1uHMAdhZJSqwYar8XYV_NrUQcbA0i6g6-/preview', thumbnail: 'https://drive.google.com/thumbnail?id=1uHMAdhZJSqwYar8XYV_NrUQcbA0i6g6-&sz=w1000' },
                        { id: 4, title: 'Lesson 3 - Core Concepts', duration: '20:00', videoUrl: 'https://drive.google.com/file/d/1nQdUC8NrFpd-GiTgvSmYpsdVDK6r3lJy/preview', thumbnail: 'https://drive.google.com/thumbnail?id=1nQdUC8NrFpd-GiTgvSmYpsdVDK6r3lJy&sz=w1000' },
                        { id: 5, title: 'Lesson 4 - Practical Applications', duration: '22:15', videoUrl: 'https://drive.google.com/file/d/10hgirQhLVu5IoalRBLnIW7CMyl9vQiy_/preview', thumbnail: 'https://drive.google.com/thumbnail?id=10hgirQhLVu5IoalRBLnIW7CMyl9vQiy_&sz=w1000' },
                        { id: 6, title: 'Lesson 5 - Advanced Techniques', duration: '25:00', videoUrl: 'https://drive.google.com/file/d/1HXyLn9wDiGiLCelEXr0jipPIcQ5EjfMC/preview', thumbnail: 'https://drive.google.com/thumbnail?id=1HXyLn9wDiGiLCelEXr0jipPIcQ5EjfMC&sz=w1000' },
                        { id: 7, title: 'Lesson 6 - Final Project Setup', duration: '16:30', videoUrl: 'https://drive.google.com/file/d/1kswDC7oT5YV9SfqdBlmARDJj6_eiyJzD/preview', thumbnail: 'https://drive.google.com/thumbnail?id=1kswDC7oT5YV9SfqdBlmARDJj6_eiyJzD&sz=w1000' }
                    ]
                },
                {
                    title: 'Founder Mastery Course',
                    requiresCompletion: 7, 
                    lessons: [
                        { id: 8, title: 'Founder Mastery - Lesson 1', duration: '20:00', videoUrl: 'https://drive.google.com/file/d/1LmDbGoHxZOlRLnShNKXxyjy0aI0g4UA8/preview', thumbnail: 'https://drive.google.com/thumbnail?id=1LmDbGoHxZOlRLnShNKXxyjy0aI0g4UA8&sz=w1000' },
                        { id: 9, title: 'Founder Mastery - Lesson 2', duration: '20:00', videoUrl: 'https://drive.google.com/file/d/1SBag6taDaltJOhJXfTrAAuqsk5Dq60zu/preview', thumbnail: 'https://drive.google.com/thumbnail?id=1SBag6taDaltJOhJXfTrAAuqsk5Dq60zu&sz=w1000' },
                        { id: 10, title: 'Founder Mastery - Lesson 3', duration: '20:00', videoUrl: 'https://drive.google.com/file/d/1scvSqL8t2OjPLXTBWJPSEyxPjKjvwQ65/preview', thumbnail: 'https://drive.google.com/thumbnail?id=1scvSqL8t2OjPLXTBWJPSEyxPjKjvwQ65&sz=w1000' },
                        { id: 11, title: 'Founder Mastery - Lesson 4', duration: '20:00', videoUrl: 'https://drive.google.com/file/d/1ErUKP4NjFbUk2q2NyTCHJsf8whOm2YEt/preview', thumbnail: 'https://drive.google.com/thumbnail?id=1ErUKP4NjFbUk2q2NyTCHJsf8whOm2YEt&sz=w1000' },
                        { id: 12, title: 'Founder Mastery - Lesson 5', duration: '20:00', videoUrl: 'https://drive.google.com/file/d/15qs0O0vPuCiLbaNU0gTIfyNHaqce8D7q/preview', thumbnail: 'https://drive.google.com/thumbnail?id=15qs0O0vPuCiLbaNU0gTIfyNHaqce8D7q&sz=w1000' },
                        { id: 13, title: 'Founder Mastery - Lesson 6', duration: '20:00', videoUrl: 'https://drive.google.com/file/d/18mSOecPmCVjpXaxHtQyPC24nwR57prmX/preview', thumbnail: 'https://drive.google.com/thumbnail?id=18mSOecPmCVjpXaxHtQyPC24nwR57prmX&sz=w1000' }
                    ]
                }
            ];

            const handleModuleClick = (idx, module) => {
                if (module.requiresCompletion && !completedLessons.includes(module.requiresCompletion)) {
                    setModuleError('කරුණාකරලා AI Foundations - Basic Lessons ඔක්කොම බලලා ඉන්න');
                    setTimeout(() => setModuleError(''), 4000);
                    return;
                }
                setActiveModule(idx);
                setModuleError('');
            };

            const handleVideoComplete = () => {
                let updated = [...completedLessons];
                if (activeLesson && !updated.includes(activeLesson.id)) {
                    updated.push(activeLesson.id);
                    setCompletedLessons(updated);
                }
                setWatching(false);

                // Auto move to next lesson or module
                const currentLessons = modules[activeModule].lessons;
                const currentIdx = currentLessons.findIndex(l => l.id === activeLesson.id);

                if (currentIdx < currentLessons.length - 1) {
                    setActiveLesson(currentLessons[currentIdx + 1]);
                } else if (activeModule < modules.length - 1) {
                    const nextModIdx = activeModule + 1;
                    if (updated.includes(modules[nextModIdx].requiresCompletion || -1) || !modules[nextModIdx].requiresCompletion) {
                        setActiveModule(nextModIdx);
                        setActiveLesson(modules[nextModIdx].lessons[0]);
                    }
                }
            };

            const totalLessons = modules.reduce((acc, m) => acc + m.lessons.length, 0);
            const progress = Math.round((completedLessons.length / totalLessons) * 100);

            return (
                <div className="min-h-screen pt-24 pb-12 px-4 max-w-7xl mx-auto">
                    <div className="grid lg:grid-cols-3 gap-8">
                        <div className="space-y-6">
                            <div className="glass-strong rounded-2xl p-6">
                                <div className="flex items-center gap-4 mb-4">
                                    <div className="w-12 h-12 rounded-full bg-indigo-500 flex items-center justify-center font-bold">{user?.name?.[0]}</div>
                                    <div><h3 className="text-white font-semibold">{user?.name}</h3><p className="text-xs text-gray-400">Student</p></div>
                                </div>
                                <div className="text-sm mb-2 flex justify-between"><span className="text-gray-400">Progress</span><span className="text-white">{progress}%</span></div>
                                <div className="h-2 bg-gray-700 rounded-full overflow-hidden"><div className="h-full bg-indigo-500 transition-all duration-500" style={{width: `${progress}%`}}></div></div>
                            </div>

                            <div className="glass rounded-2xl p-4 max-h-[500px] overflow-y-auto">
                                <h4 className="text-white font-semibold mb-4">Modules</h4>
                                {moduleError && <div className="p-2 mb-4 bg-red-500/20 text-red-400 text-xs rounded-lg border border-red-500/50">{moduleError}</div>}
                                {modules.map((m, mIdx) => (
                                    <div key={mIdx} className="mb-4">
                                        <button onClick={() => handleModuleClick(mIdx, m)} className={`w-full text-left p-3 rounded-xl mb-1 flex justify-between items-center ${activeModule === mIdx ? 'bg-indigo-600/20 border border-indigo-500/30' : 'hover:bg-white/5'}`}>
                                            <span className="text-xs font-medium text-white">{m.title}</span>
                                            {m.requiresCompletion && !completedLessons.includes(m.requiresCompletion) && <Icon name="lock" size={14} className="text-yellow-500" />}
                                        </button>
                                        {activeModule === mIdx && (
                                            <div className="ml-2 space-y-1">
                                                {m.lessons.map((l, lIdx) => (
                                                    <button key={l.id} onClick={() => setActiveLesson(l)} className={`w-full text-left p-2 rounded-lg text-[11px] flex items-center gap-2 ${activeLesson?.id === l.id ? 'text-indigo-400 bg-indigo-400/10' : completedLessons.includes(l.id) ? 'text-green-400' : 'text-gray-400'}`}>
                                                        <Icon name={completedLessons.includes(l.id) ? "check-circle" : "play-circle"} size={12} />
                                                        <span className="truncate">{l.title}</span>
                                                    </button>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="lg:col-span-2">
                            <div className="glass-strong rounded-2xl overflow-hidden min-h-[400px]">
                                {activeLesson ? (
                                    <div>
                                        <div className="aspect-video bg-black relative">
                                            {!watching ? (
                                                <div className="w-full h-full cursor-pointer group" onClick={() => setWatching(true)}>
                                                    <img src={activeLesson.thumbnail} className="w-full h-full object-cover opacity-60 group-hover:opacity-40 transition-opacity" />
                                                    <div className="absolute inset-0 flex items-center justify-center"><Icon name="play" size={64} className="text-white opacity-80" /></div>
                                                </div>
                                            ) : (
                                                <iframe src={activeLesson.videoUrl} className="w-full h-full" allow="autoplay" allowFullScreen></iframe>
                                            )}
                                        </div>
                                        <div className="p-6">
                                            <h2 className="text-xl font-bold text-white mb-4">{activeLesson.title}</h2>
                                            <div className="flex gap-4">
                                                {!completedLessons.includes(activeLesson.id) ? (
                                                    <button onClick={handleVideoComplete} className="px-6 py-2 bg-indigo-600 text-white rounded-lg text-sm font-medium">Mark as Complete</button>
                                                ) : (
                                                    <span className="px-6 py-2 bg-green-500/20 text-green-400 rounded-lg text-sm font-medium flex items-center gap-2"><Icon name="check-circle" size={16} /> Completed</span>
                                                )}
                                            </div>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="h-full flex flex-col items-center justify-center text-center p-10">
                                        <Icon name="award" size={64} className="text-indigo-500 mb-4" />
                                        <h3 className="text-white text-xl font-bold">Start Your Learning Journey</h3>
                                        <p className="text-gray-400 mt-2">Select a lesson from the sidebar to begin watching</p>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const AuthPage = ({ onLogin }) => {
            const [isLogin, setIsLogin] = useState(true);
            const [data, setData] = useState({ name: '', email: '', password: '', phone: '', otp: '' });
            const [step, setStep] = useState(1);
            
            const handleSubmit = async (e) => {
                e.preventDefault();
                if(isLogin) { onLogin({ name: data.email.split('@')[0], email: data.email }); }
                else {
                    if(step === 1) setStep(2);
                    else onLogin({ name: data.name, email: data.email });
                }
            };

            return (
                <div className="min-h-screen flex items-center justify-center px-4">
                    <div className="glass-strong p-8 rounded-3xl w-full max-w-md">
                        <h2 className="text-2xl font-bold text-white text-center mb-6">{isLogin ? 'Login' : 'Register'}</h2>
                        <form onSubmit={handleSubmit} className="space-y-4">
                            {!isLogin && step === 1 && <input type="text" placeholder="Name" className="w-full p-3 rounded-xl bg-gray-800 text-white border border-gray-700" onChange={e => setData({...data, name: e.target.value})} />}
                            <input type="email" placeholder="Email" className="w-full p-3 rounded-xl bg-gray-800 text-white border border-gray-700" onChange={e => setData({...data, email: e.target.value})} />
                            {!isLogin && step === 2 ? (
                                <input type="text" placeholder="6-digit OTP" className="w-full p-3 rounded-xl bg-gray-800 text-white border border-gray-700 text-center tracking-widest" maxLength="6" onChange={e => setData({...data, otp: e.target.value})} />
                            ) : (
                                <input type="password" placeholder="Password" className="w-full p-3 rounded-xl bg-gray-800 text-white border border-gray-700" onChange={e => setData({...data, password: e.target.value})} />
                            )}
                            <button className="w-full py-3 bg-indigo-600 text-white rounded-xl font-bold">{isLogin ? 'Login' : step === 1 ? 'Next' : 'Verify & Register'}</button>
                        </form>
                        <button onClick={() => {setIsLogin(!isLogin); setStep(1);}} className="w-full mt-4 text-gray-400 text-sm">{isLogin ? 'Create an account' : 'Already have an account?'}</button>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [page, setPage] = useState('home');
            const [user, setUser] = useState(null);
            
            useEffect(() => {
                initParticles();
                const handleNav = (e) => setPage(e.detail);
                window.addEventListener('navigate', handleNav);
                return () => window.removeEventListener('navigate', handleNav);
            }, []);

            return (
                <AuthContext.Provider value={{ user, isLoggedIn: !!user }}>
                    <div className="min-h-screen text-gray-100">
                        <Navigation />
                        {page === 'home' && <Hero />}
                        {page === 'auth' && <AuthPage onLogin={(u) => {setUser(u); setPage('dashboard');}} />}
                        {page === 'dashboard' && <Dashboard onLogout={() => {setUser(null); setPage('home');}} />}
                        <footer className="py-10 text-center text-gray-600 text-xs">© 2024 Aura AI Creations</footer>
                    </div>
                </AuthContext.Provider>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
